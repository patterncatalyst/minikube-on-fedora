apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx-helm.fullname" . }}-content
  labels:
    {{- include "nginx-helm.labels" . | nindent 4 }}
data:
  index.html: |
    <!doctype html>
    <html>
    <head><title>{{ .Values.content.title }}</title></head>
    <body>
    <h1>{{ .Values.content.title }}</h1>
    <p>{{ .Values.content.message }}</p>
    <p><strong>Custom line:</strong> {{ .Values.content.customLine }}</p>
    <p>Replicas: {{ .Values.replicaCount }} · Service port: {{ .Values.service.port }}</p>
    <p>Rendered by helm chart {{ .Chart.Name }}-{{ .Chart.Version }} ({{ .Chart.AppVersion }})</p>
    </body>
    </html>
