# examples/06-deploy-nginx-kubectl/nginx.conf
#
# Minimal nginx config for serving static content as a non-root user
# from a Kubernetes container.
#
# Differences from RHEL/UBI 9's default /etc/nginx/nginx.conf:
#
#   - No `user` directive. The default has `user nginx;`; that
#     triggers a warning when nginx isn't running as root (which we
#     never are in this image, USER 1001 in the Containerfile)
#   - Logs to /dev/stdout and /dev/stderr. The default writes
#     access.log and error.log to /var/log/nginx/, which kubectl
#     logs cannot see. Without stdout/stderr, runtime failures
#     (such as port-bind permission denials) are invisible — you
#     get a CrashLoopBackOff with no obvious cause
#   - pid file in /tmp (world-writable). The default's
#     /run/nginx.pid is only writable as root
#   - All *_temp_path directives point at /tmp so nginx doesn't try
#     to write to /var/lib/nginx (which non-root UIDs may not have
#     access to). nginx allocates these temp dirs for buffering
#     request bodies and proxy/cgi responses; even a static-content
#     server allocates them on startup
#   - Single server block listening on 8080 instead of 80, so no
#     CAP_NET_BIND_SERVICE is needed

worker_processes  auto;
error_log         /dev/stderr  warn;
pid               /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    access_log         /dev/stdout;
    sendfile           on;
    keepalive_timeout  65;

    # Move temp paths off /var/lib/nginx so we don't need write
    # access there. Even a static-content server creates these on
    # startup.
    client_body_temp_path  /tmp/nginx-client-body;
    proxy_temp_path        /tmp/nginx-proxy;
    fastcgi_temp_path      /tmp/nginx-fastcgi;
    uwsgi_temp_path        /tmp/nginx-uwsgi;
    scgi_temp_path         /tmp/nginx-scgi;

    server {
        listen       8080  default_server;
        listen       [::]:8080  default_server;
        server_name  _;
        root         /usr/share/nginx/html;

        location / {
            index  index.html;
        }
    }
}
