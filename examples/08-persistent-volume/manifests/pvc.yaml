apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-content
  labels:
    app: nginx-pv
spec:
  # ReadWriteOnce — the minikube hostpath provisioner backs this
  # with a directory on the (single) node; RWO is the natural fit.
  # For multi-node clusters with multiple replicas, you'd want RWX
  # and a backend that supports it (NFS, CephFS, EFS, etc.).
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  # No storageClassName — falls through to the default StorageClass.
  # On minikube that's "standard" (k8s.io/minikube-hostpath).
