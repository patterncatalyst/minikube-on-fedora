apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-np
  labels:
    app: nginx-np
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-np
  template:
    metadata:
      labels:
        app: nginx-np
    spec:
      containers:
      - name: nginx
        image: nginx-custom:v1
        # Same image as §6 — built once, used everywhere. The demo.sh
        # builds it from §6's Containerfile if not already cached.
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
