# job-postgres.yaml — one-off Job that runs the Postgres ingestion workflow.
#
# Mounts the `om-ingestion-config` ConfigMap (created by
# scripts/ingest-openmetadata.sh from the files in this directory) at
# /opt/ingestion, fetches an admin token in-cluster, injects it plus the CNPG
# password into a writable copy of postgres.yaml, then runs `metadata ingest`.
#
# Substitution is done in Python, not sed, so a CNPG-generated password
# containing shell/sed metacharacters can't break the command.
#
# Re-runnable: scripts/ingest-openmetadata.sh deletes any prior Job of this
# name before applying (a Job's pod template is immutable, so re-apply alone
# would fail). OpenMetadata upserts entities by FQN, so re-ingestion is safe.
apiVersion: batch/v1
kind: Job
metadata:
  name: om-ingest-postgres
  namespace: capstone
  labels:
    app.kubernetes.io/part-of: capstone
    app.kubernetes.io/component: openmetadata-ingestion
    capstone.ingestion/source: postgres
spec:
  backoffLimit: 2
  template:
    metadata:
      annotations:
        # Ingestion Jobs must NOT be meshed: short-lived batch work talking
        # directly to Postgres/Kafka/OpenMetadata. An istio-proxy sidecar races
        # the ingest container at startup AND prevents the Job pod from ever
        # completing (the proxy keeps running). A node cycle re-enabled namespace
        # injection (istio-injection=enabled), silently breaking these Jobs;
        # this opts them out. (r34)
        sidecar.istio.io/inject: "false"
      labels:
        app.kubernetes.io/part-of: capstone
        app.kubernetes.io/component: openmetadata-ingestion
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: docker.io/openmetadata/ingestion:1.12.8
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "==> obtaining OpenMetadata token (admin login, in-cluster)"
              export OM_JWT="$(python3 /opt/ingestion/get_token.py)"
              echo "==> injecting credentials into a writable workflow config"
              python3 - <<'PY'
              import os
              t = open("/opt/ingestion/postgres.yaml").read()
              t = t.replace("__OM_JWT__", os.environ["OM_JWT"])
              t = t.replace("__PG_PASSWORD__", os.environ["PG_PASSWORD"])
              open("/tmp/postgres.yaml", "w").write(t)
              PY
              echo "==> running Postgres ingestion"
              metadata ingest -c /tmp/postgres.yaml
          env:
            - name: OM_HOST
              value: http://openmetadata:8585
            - name: OM_ADMIN_PASSWORD
              value: admin            # demo default (r27); not a real secret
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: capstone-postgres-app   # CNPG-generated app secret
                  key: password
          volumeMounts:
            - name: ingestion-config
              mountPath: /opt/ingestion
              readOnly: true
      volumes:
        - name: ingestion-config
          configMap:
            name: om-ingestion-config
