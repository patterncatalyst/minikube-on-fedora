# order-service subchart values.

replicas: 1

image:
  repository: localhost:5000/order-service
  tag: v1
  pullPolicy: Always

service:
  port: 80
  targetPort: 8080

# inventory-service gRPC endpoint (r23) — order-service calls CheckStock here.
inventory:
  grpcAddr: inventory-service:50051

# Kafka (r25) — order.placed events published here.
kafka:
  bootstrap: capstone-kafka-kafka-bootstrap:9092
  orderTopic: order-placed

# Apicurio schema registry (r25b) — order.placed registered + serialized as Avro.
apicurio:
  url: http://apicurio:8080
  orderSubject: order-placed-value

# Postgres connection. The CloudNativePG operator generates a Secret named
# "<cluster>-app" holding the app user's credentials. We reference it by
# key so we never hardcode the password.
postgres:
  clusterName: capstone-postgres
  # CNPG's "<cluster>-app" secret contains: username, password, dbname,
  # host, port, uri, jdbc-uri. We map the ones order-service needs.
  appSecret: capstone-postgres-app
  schema: orders

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    memory: 512Mi

# Probe tuning. /health is liveness, /healthz is readiness (checks Postgres).
probes:
  # r28: startupProbe gates liveness/readiness until the app has finished booting.
  # Python services (imports + gRPC channels + schema build) can take 10-30s; a 5s
  # liveness initialDelay was killing them mid-boot (and the gateway OOM-looped at
  # 256Mi). 30 x 2s = 60s startup grace.
  startup:
    path: /health
    failureThreshold: 60
    periodSeconds: 2
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 5
