apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: review-service
    app.kubernetes.io/part-of: capstone
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: review-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
