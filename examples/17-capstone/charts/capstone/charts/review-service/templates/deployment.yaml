apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: review-service
    app.kubernetes.io/part-of: capstone
    app.kubernetes.io/component: data-product
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: review-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: review-service
        app.kubernetes.io/part-of: capstone
    spec:
      containers:
        - name: review-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: SERVICE_SCHEMA
              value: {{ .Values.postgres.schema | quote }}
            # Predictable Demands pattern: declare exactly what we need.
            - name: PG_HOST
              value: "{{ .Values.postgres.clusterName }}-rw.{{ .Release.Namespace }}.svc.cluster.local"
            - name: PG_PORT
              value: "5432"
            - name: PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: dbname
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: password
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
          # Health Probe pattern (Kubernetes Patterns, Ibryam & Huss).
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
