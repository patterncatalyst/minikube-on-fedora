# graphql-gateway subchart values. Stateless — no Postgres.

replicas: 1

image:
  repository: localhost:5000/graphql-gateway
  tag: v1
  # Always: mutable :v1 tag during the dev loop (CAP-015).
  pullPolicy: Always

service:
  port: 80
  targetPort: 8080

# Downstream endpoints the gateway federates over.
downstream:
  orderRestUrl: http://order-service
  inventoryGrpcAddr: inventory-service:50051

# r29c: OpenTelemetry tracing. The image is instrumented (FastAPI server span +
# httpx and gRPC client spans), so a GraphQL query becomes a fan-out trace —
# order-service (REST) and inventory-service (gRPC) appear as child spans.
# r29c.2: export over OTLP HTTP/protobuf to Tempo's :4318 receiver. (gRPC on 4317
# silently dropped spans here — the http://...:4317 endpoint with protocol=grpc
# attempts TLS against a plaintext port. A working otel-lgtm reference uses
# http/protobuf:4318; it's the more robust default.) Set enabled:false to run untraced.
tracing:
  enabled: true
  otlpEndpoint: http://tempo.observability.svc.cluster.local:4318
  otlpProtocol: http/protobuf
  serviceName: graphql-gateway
  sampleRatio: "1.0"   # demo: trace every request

resources:
  requests:
    cpu: 100m
    memory: 192Mi
  limits:
    memory: 512Mi

probes:
  # r28: startupProbe gates liveness/readiness until the app has finished booting.
  # Python services (imports + gRPC channels + schema build) can take 10-30s; a 5s
  # liveness initialDelay was killing them mid-boot (and the gateway OOM-looped at
  # 256Mi). 30 x 2s = 60s startup grace.
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 2
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 5
