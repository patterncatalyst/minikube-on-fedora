apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: graphql-gateway
    app.kubernetes.io/part-of: capstone
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: graphql-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphql-gateway
        app.kubernetes.io/part-of: capstone
      annotations:
        # r26b: keep the gateway OUT of the mesh. The namespace is
        # injection-labeled (r26), but the KEDA HTTP add-on's interceptor fronts
        # this service — an istio-proxy sidecar would contend with it on the
        # ingress path (CAP-025). Only order-service is meshed.
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: graphql-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: ORDER_REST_URL
              value: {{ .Values.downstream.orderRestUrl | quote }}
            - name: INVENTORY_GRPC_ADDR
              value: {{ .Values.downstream.inventoryGrpcAddr | quote }}
            {{- if .Values.tracing.enabled }}
            # r29c: OpenTelemetry → Tempo. opentelemetry-instrument (the image
            # entrypoint) reads these; no app code change.
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.tracing.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.tracing.otlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.tracing.otlpProtocol | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: {{ .Values.tracing.sampleRatio | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=capstone"
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
