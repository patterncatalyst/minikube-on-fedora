apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: capstone
    app.kubernetes.io/component: data-product
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/part-of: capstone
      annotations:
        # r26b: keep this KEDA-scaled consumer OUT of the mesh. The namespace is
        # injection-labeled (r26, for the order-service canary), so without this
        # opt-out a recreated pod would get an istio-proxy sidecar. Only
        # order-service is meshed; notification-service scales on Kafka lag.
        sidecar.istio.io/inject: "false"
    spec:
      # Init container runs Alembic migrations before the app starts, so the
      # `notifications` schema + table exist and the app issues no DDL
      # (retires create_all — CAP-021). Same image, same DB env as the app.
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /opt/app-root/src
          command: ["alembic", "upgrade", "head"]
          env:
            - name: SERVICE_SCHEMA
              value: {{ .Values.postgres.schema | quote }}
            - name: PG_HOST
              value: "{{ .Values.postgres.clusterName }}-rw.{{ .Release.Namespace }}.svc.cluster.local"
            - name: PG_PORT
              value: "5432"
            - name: PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: dbname
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: password
      containers:
        - name: notification-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: SERVICE_SCHEMA
              value: {{ .Values.postgres.schema | quote }}
            - name: KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrap | quote }}
            - name: KAFKA_ORDER_TOPIC
              value: {{ .Values.kafka.orderTopic | quote }}
            - name: KAFKA_GROUP
              value: {{ .Values.kafka.group | quote }}
            - name: APICURIO_URL
              value: {{ .Values.apicurio.url | quote }}
            # Predictable Demands pattern: declare exactly what we need.
            - name: PG_HOST
              value: "{{ .Values.postgres.clusterName }}-rw.{{ .Release.Namespace }}.svc.cluster.local"
            - name: PG_PORT
              value: "5432"
            - name: PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: dbname
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.appSecret }}
                  key: password
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
          # Health Probe pattern (Kubernetes Patterns, Ibryam & Huss).
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
