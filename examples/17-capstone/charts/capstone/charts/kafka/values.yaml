# Single-node KRaft Kafka cluster for the capstone async spine.
# Dev-scale: one dual-role node, ephemeral storage, replication factor 1.
# Production would use separate broker/controller pools, persistent storage,
# replication factor 3, and min.insync.replicas 2 (noted in §17 prose).

clusterName: capstone-kafka
replicas: 1
replicationFactor: 1
minInsyncReplicas: 1

topic:
  name: order-placed
  partitions: 1
  replicas: 1
