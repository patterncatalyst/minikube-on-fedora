# examples/12-keda-kafka/manifests/kafka-cluster.yaml
#
# Single-node KRaft Kafka cluster managed by Strimzi.
# - Combined controller + broker roles in one Pod (development sizing)
# - Kafka 4.1.0 pinned: Strimzi 0.51 supports ONLY Kafka 4.1.0, 4.1.1,
#   and 4.2.0. The 3.x line was dropped entirely in Strimzi 0.51
# - metadataVersion omitted: Strimzi defaults it to match the Kafka
#   version on first cluster creation, which is safer than guessing
#   the right `4.1-IV?` minor (KRaft metadata version naming follows
#   a pattern but specific IV numbers aren't stable across releases)
# - Internal listener only (KEDA scaler reaches Kafka in-cluster)
# - Replication factor 1 everywhere (single broker can't replicate)
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: my-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 5Gi
        deleteClaim: false
        kraftMetadata: shared
  resources:
    requests:
      cpu: "250m"
      memory: "768Mi"
    limits:
      cpu: "1"
      memory: "1536Mi"
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
    userOperator:
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
