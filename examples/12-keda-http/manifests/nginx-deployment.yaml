# examples/12-keda-http/manifests/nginx-deployment.yaml
#
# Reuses nginx-custom:v1 from §6 (multi-stage UBI image). Starts at
# replicas: 0 — KEDA HTTP add-on takes ownership the moment the
# HTTPScaledObject is applied.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-http
  labels:
    app: nginx-http
spec:
  replicas: 0
  selector:
    matchLabels:
      app: nginx-http
  template:
    metadata:
      labels:
        app: nginx-http
    spec:
      containers:
        - name: nginx
          image: nginx-custom:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-http
  labels:
    app: nginx-http
spec:
  type: ClusterIP
  selector:
    app: nginx-http
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
