<svg width="100%" viewBox="0 0 920 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" font-size="14">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 L 0 40" fill="none" stroke="#ebe5d6" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5e5e5e"/>
    </marker>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8170"/>
    </marker>
  </defs>
  <style>
    .blue       { fill: #dbe6f1; stroke: #4a7bb8; stroke-width: 1.5; }
    .blue-pale  { fill: #e8eff7; stroke: #4a7bb8; stroke-width: 1.2; }
    .tan        { fill: #ebe1cc; stroke: #a08456; stroke-width: 1.5; }
    .neutral    { fill: #ebebe5; stroke: #5e5e5e; stroke-width: 1.2; }
    .label      { fill: #2c2c2c; }
    .sublabel   { fill: #5e5e5e; font-size: 11px; }
    .title      { fill: #2c2c2c; font-weight: 600; font-size: 16px; }
    .mono       { font-family: ui-monospace, SFMono-Regular, Menlo, "Courier New", monospace; font-size: 12px; fill: #2c2c2c; }
    .mono-sm    { font-family: ui-monospace, SFMono-Regular, Menlo, "Courier New", monospace; font-size: 10px; fill: #5e5e5e; }
    .arrow      { stroke: #5e5e5e; stroke-width: 1.5; fill: none; }
    .control-arrow { stroke: #8a8170; stroke-width: 1; fill: none; stroke-dasharray: 3 3; }
    .plane-divider { stroke: #c4baa8; stroke-width: 1; stroke-dasharray: 6 3; }
    .plane-label { fill: #8a8170; font-size: 11px; font-style: italic; }
    .footnote { fill: #5e5e5e; font-size: 11px; font-style: italic; }
  </style>

  <rect width="920" height="500" fill="#fdfbf7"/>
  <rect width="920" height="500" fill="url(#grid)"/>

  <text x="460" y="40" text-anchor="middle" class="title">Istio service mesh — control plane and data plane</text>

  <rect x="380" y="70" width="160" height="56" rx="4" class="neutral"/>
  <text x="460" y="94" text-anchor="middle" class="label">istiod</text>
  <text x="460" y="112" text-anchor="middle" class="sublabel">xDS config push, certificate issuance</text>

  <line x1="40" y1="160" x2="880" y2="160" class="plane-divider"/>
  <text x="50" y="155" class="plane-label">control plane</text>
  <text x="50" y="175" class="plane-label">data plane</text>

  <rect x="40" y="220" width="100" height="64" rx="3" class="tan"/>
  <text x="90" y="245" text-anchor="middle" class="label">External</text>
  <text x="90" y="263" text-anchor="middle" class="label">client</text>

  <rect x="170" y="200" width="120" height="120" rx="4" class="blue"/>
  <text x="230" y="222" text-anchor="middle" class="label">Ingress GW</text>
  <rect x="185" y="240" width="90" height="60" rx="3" class="blue-pale"/>
  <text x="230" y="263" text-anchor="middle" class="sublabel">envoy</text>
  <text x="230" y="280" text-anchor="middle" class="mono-sm">istio-proxy</text>

  <rect x="320" y="200" width="160" height="120" rx="4" class="blue"/>
  <text x="400" y="222" text-anchor="middle" class="label">App Pod</text>
  <rect x="335" y="232" width="60" height="80" rx="3" class="blue-pale"/>
  <text x="365" y="253" text-anchor="middle" class="sublabel">app</text>
  <text x="365" y="270" text-anchor="middle" class="mono-sm">reviews-v2</text>
  <rect x="405" y="232" width="60" height="80" rx="3" class="blue-pale"/>
  <text x="435" y="253" text-anchor="middle" class="sublabel">sidecar</text>
  <text x="435" y="270" text-anchor="middle" class="sublabel">envoy</text>

  <rect x="510" y="200" width="160" height="120" rx="4" class="blue"/>
  <text x="590" y="222" text-anchor="middle" class="label">App Pod</text>
  <rect x="525" y="232" width="60" height="80" rx="3" class="blue-pale"/>
  <text x="555" y="253" text-anchor="middle" class="sublabel">app</text>
  <text x="555" y="270" text-anchor="middle" class="mono-sm">details-v1</text>
  <rect x="595" y="232" width="60" height="80" rx="3" class="blue-pale"/>
  <text x="625" y="253" text-anchor="middle" class="sublabel">sidecar</text>
  <text x="625" y="270" text-anchor="middle" class="sublabel">envoy</text>

  <rect x="700" y="200" width="120" height="120" rx="4" class="blue"/>
  <text x="760" y="222" text-anchor="middle" class="label">Egress GW</text>
  <rect x="715" y="240" width="90" height="60" rx="3" class="blue-pale"/>
  <text x="760" y="263" text-anchor="middle" class="sublabel">envoy</text>
  <text x="760" y="280" text-anchor="middle" class="mono-sm">istio-proxy</text>

  <rect x="848" y="220" width="60" height="64" rx="3" class="tan"/>
  <text x="878" y="248" text-anchor="middle" class="label">Ext</text>
  <text x="878" y="264" text-anchor="middle" class="sublabel">svc</text>

  <path d="M 140 252 L 166 252" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 290 270 L 316 270" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 480 270 L 506 270" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 670 270 L 696 270" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 820 252 L 845 252" class="arrow" marker-end="url(#arrow)"/>

  <path d="M 430 126 Q 350 160 230 196" class="control-arrow" marker-end="url(#arrow-thin)"/>
  <path d="M 450 126 Q 425 165 432 226" class="control-arrow" marker-end="url(#arrow-thin)"/>
  <path d="M 470 126 Q 540 165 622 226" class="control-arrow" marker-end="url(#arrow-thin)"/>
  <path d="M 490 126 Q 600 160 760 196" class="control-arrow" marker-end="url(#arrow-thin)"/>

  <text x="460" y="370" text-anchor="middle" class="sublabel">solid arrows = traffic flow · dashed arrows = xDS config and mTLS certificates pushed by istiod</text>

  <text x="460" y="478" text-anchor="middle" class="footnote">Every workload Pod runs a sidecar envoy. Traffic between Pods is intercepted, mTLS-encrypted, and routed per istiod's config — without app code changes.</text>
</svg>
