<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="520" fill="#ffffff"/><defs></defs><text x="590.0" y="30" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Three planes of the self-serve platform</text><text x="590.0" y="49" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">different abstractions for different users</text><rect x="120" y="96" width="760" height="110" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="500.0" y="155.5" font-size="13" fill="#5a8a3a" text-anchor="middle" font-weight="600"></text><text x="150" y="130" font-size="15" fill="#2a5a1a" text-anchor="start" font-weight="700">Mesh experience plane</text><text x="150" y="158" font-size="11.5" fill="#3a3a3a" text-anchor="start">discover, search and correlate data products across the mesh</text><text x="150" y="182" font-size="10.5" fill="#666666" text-anchor="start" font-style="italic">users: data product owners</text><rect x="910" y="124" width="150" height="54" fill="#ffffff" stroke="#5a8a3a" stroke-width="1" rx="6"/><text x="985.0" y="154.0" font-size="10" fill="#2a5a1a" text-anchor="middle" font-weight="600">data product owners</text><rect x="120" y="226" width="760" height="110" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="500.0" y="285.5" font-size="13" fill="#2c5aa0" text-anchor="middle" font-weight="600"></text><text x="150" y="260" font-size="15" fill="#1a3a6a" text-anchor="start" font-weight="700">Data product developer experience plane</text><text x="150" y="288" font-size="11.5" fill="#3a3a3a" text-anchor="start">build, deploy, test and run a data product; cross-cutting standards applied automatically</text><text x="150" y="312" font-size="10.5" fill="#666666" text-anchor="start" font-style="italic">users: data product developers</text><rect x="910" y="254" width="150" height="54" fill="#ffffff" stroke="#2c5aa0" stroke-width="1" rx="6"/><text x="985.0" y="284.0" font-size="10" fill="#1a3a6a" text-anchor="middle" font-weight="600">data product developers</text><rect x="120" y="356" width="760" height="110" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="500.0" y="415.5" font-size="13" fill="#c19a6b" text-anchor="middle" font-weight="600"></text><text x="150" y="390" font-size="15" fill="#5a3a0a" text-anchor="start" font-weight="700">Infrastructure provisioning plane</text><text x="150" y="418" font-size="11.5" fill="#3a3a3a" text-anchor="start">low-level storage, compute, accounts, networking, identity</text><text x="150" y="442" font-size="10.5" fill="#666666" text-anchor="start" font-style="italic">users: platform engineers</text><rect x="910" y="384" width="150" height="54" fill="#ffffff" stroke="#c19a6b" stroke-width="1" rx="6"/><text x="985.0" y="414.0" font-size="10" fill="#5a3a0a" text-anchor="middle" font-weight="600">platform engineers</text><text x="590.0" y="495" font-size="11" fill="#6a5a3a" text-anchor="middle" font-style="italic">Reference tools: Kafka (Strimzi) · registry (Apicurio) · catalog (OpenMetadata) · scaling (KEDA) · mesh (Istio) · observability (OTEL/Prometheus/Grafana)</text></svg>