<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 540" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="540" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Principle 01: Domain ownership — realized</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">The value, and the pieces of the reference implementation that deliver it</text><rect x="90" y="75" width="1000" height="70" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="110" y="103" font-size="13" fill="#1a3a6a" text-anchor="start" font-weight="700">01  DOMAIN OWNERSHIP</text><text x="110" y="127" font-size="12" fill="#3a3a3a" text-anchor="start">Each domain ships its data product on its own, with a clear owner and an enforced boundary — no central team in the path.</text><text x="90" y="180" font-size="10" fill="#8a7a5a" text-anchor="start" font-weight="600">REALIZED BY — the reference-implementation pieces</text><rect x="90" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="102" y="212" width="200" height="26" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="202" y="229" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">Project / namespace</text><text x="104" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">the tenancy boundary —</text><text x="104" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">one per domain</text><rect x="345" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="357" y="212" width="200" height="26" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="457" y="229" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">project-scoped RBAC</text><text x="359" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">the team owns inside,</text><text x="359" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">nothing reaches across</text><rect x="600" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="612" y="212" width="200" height="26" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="712" y="229" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">SCCs</text><text x="614" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">what the domain's pods</text><text x="614" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">may do on the node</text><rect x="855" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="867" y="212" width="200" height="26" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="967" y="229" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">ResourceQuota</text><text x="869" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">the budget — one domain</text><text x="869" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">can't starve another</text><rect x="90" y="340" width="1000" height="60" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="110" y="366" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">WITHOUT IT</text><text x="110" y="386" font-size="11.5" fill="#3a3a3a" text-anchor="start">Fuzzy boundaries and ownership vacuums: data nobody owns, modeled three ways by three teams.</text><text x="590" y="524" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Each domain ships its data product on its own, with a clear owner and an enforced boundary — no central team in the path.</text></svg>