<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="560" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">A trusted base for every data product</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Red Hat UBI + trusted content: the supply chain the platform gives each domain</text><rect x="70" y="95" width="250" height="120" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="195" y="122" font-size="12.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">Red Hat UBI</text><text x="88" y="150" font-size="10.5" fill="#3a3a3a" text-anchor="start">the base image:</text><text x="88" y="166" font-size="10.5" fill="#3a3a3a" text-anchor="start">ubi9/python-311</text><text x="88" y="182" font-size="10.5" fill="#3a3a3a" text-anchor="start">freely redistributable,</text><text x="88" y="198" font-size="10.5" fill="#3a3a3a" text-anchor="start">enterprise-maintained</text><line x1="320" y1="155" x2="360" y2="155" stroke="#5a5a5a" stroke-width="1.8" marker-end="url(#arr)"/><rect x="360" y="95" width="250" height="120" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="485" y="122" font-size="12.5" fill="#2a5a1a" text-anchor="middle" font-weight="700">Trusted libraries</text><text x="378" y="150" font-size="10.5" fill="#3a3a3a" text-anchor="start">language deps from</text><text x="378" y="166" font-size="10.5" fill="#3a3a3a" text-anchor="start">Red Hat / verified</text><text x="378" y="182" font-size="10.5" fill="#3a3a3a" text-anchor="start">channels — known</text><text x="378" y="198" font-size="10.5" fill="#3a3a3a" text-anchor="start">provenance, patched</text><line x1="610" y1="155" x2="650" y2="155" stroke="#5a8a3a" stroke-width="1.8" marker-end="url(#arrG)"/><rect x="650" y="95" width="230" height="120" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="765" y="122" font-size="12.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">Your data product</text><text x="668" y="150" font-size="10.5" fill="#3a3a3a" text-anchor="start">FastAPI / gRPC /</text><text x="668" y="166" font-size="10.5" fill="#3a3a3a" text-anchor="start">Strawberry app layered</text><text x="668" y="182" font-size="10.5" fill="#3a3a3a" text-anchor="start">on the trusted base</text><line x1="880" y1="155" x2="920" y2="155" stroke="#5a5a5a" stroke-width="1.8" marker-end="url(#arr)"/><rect x="920" y="95" width="190" height="120" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="1015" y="122" font-size="12.5" fill="#a8331f" text-anchor="middle" font-weight="700">Signed &amp; scanned</text><text x="938" y="150" font-size="10.5" fill="#3a3a3a" text-anchor="start">SBOM + signature;</text><text x="938" y="166" font-size="10.5" fill="#3a3a3a" text-anchor="start">admission verifies</text><text x="938" y="182" font-size="10.5" fill="#3a3a3a" text-anchor="start">before it runs</text><rect x="70" y="250" width="1040" height="110" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="90" y="277" font-size="10" fill="#8a7a5a" text-anchor="start" font-weight="600">WHY IT EARNS ITS PLACE</text><text x="90" y="300" font-size="11.5" fill="#3a3a3a" text-anchor="start">Provenance you can prove — every layer traces to a maintained, signed source, not an anonymous public image.</text><text x="90" y="324" font-size="11.5" fill="#3a3a3a" text-anchor="start">Patched at the base — CVE fixes flow from the UBI/trusted channel, so a rebuild re-bases the whole fleet of products.</text><text x="90" y="348" font-size="11.5" fill="#3a3a3a" text-anchor="start">Governance hooks in — image signing + SBOM let admission policy reject anything unverified, mesh-wide.</text><rect x="70" y="390" width="1040" height="95" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="90" y="417" font-size="10" fill="#5a3a0a" text-anchor="start" font-weight="600">WHERE IT FITS THE MESH</text><text x="90" y="440" font-size="11.5" fill="#3a3a3a" text-anchor="start">Self-serve platform: the trusted base is shared infrastructure every domain consumes — they inherit security, they don't each source it.</text><text x="90" y="464" font-size="11.5" fill="#3a3a3a" text-anchor="start">Federated governance: signature + SBOM verification is a global rule the platform enforces at admission, automatically.</text><text x="590" y="544" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Domains build on a base they can trust and the platform can verify — security as a property they inherit, not a task they own.</text></svg>