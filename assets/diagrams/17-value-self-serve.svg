<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 540" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="540" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Principle 03: Self-serve data platform — realized</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">The value, and the pieces of the reference implementation that deliver it</text><rect x="90" y="75" width="1000" height="70" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="110" y="103" font-size="13" fill="#2a5a1a" text-anchor="start" font-weight="700">03  SELF-SERVE DATA PLATFORM</text><text x="110" y="127" font-size="12" fill="#3a3a3a" text-anchor="start">Domains consume streaming, databases, scaling, and the mesh by declaration — they don't operate the substrate.</text><text x="90" y="180" font-size="10" fill="#8a7a5a" text-anchor="start" font-weight="600">REALIZED BY — the reference-implementation pieces</text><rect x="90" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="102" y="212" width="200" height="26" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="13"/><text x="202" y="229" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">OperatorHub / OLM</text><text x="104" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">curated capabilities,</text><text x="104" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">lifecycle-managed</text><rect x="345" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="357" y="212" width="200" height="26" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="13"/><text x="457" y="229" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">AMQ Streams / CNPG</text><text x="359" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">Kafka + Postgres</text><text x="359" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">as custom resources</text><rect x="600" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="612" y="212" width="200" height="26" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="13"/><text x="712" y="229" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">KEDA</text><text x="614" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">elastic products,</text><text x="614" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">scale to zero</text><rect x="855" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="867" y="212" width="200" height="26" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="13"/><text x="967" y="229" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">GitOps</text><text x="869" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">the whole mesh,</text><text x="869" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">reproducible from Git</text><rect x="90" y="340" width="1000" height="60" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="110" y="366" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">WITHOUT IT</text><text x="110" y="386" font-size="11.5" fill="#3a3a3a" text-anchor="start">Every domain reinvents the same infrastructure badly; ownership fragments into shadow platform teams.</text><text x="590" y="524" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Domains consume streaming, databases, scaling, and the mesh by declaration — they don't operate the substrate.</text></svg>