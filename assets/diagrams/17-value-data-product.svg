</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Principle 02: Data as a product — realized</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">The value, and the pieces of the reference implementation that deliver it</text><rect x="90" y="75" width="1000" height="70" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="110" y="103" font-size="13" fill="#7a3a0a" text-anchor="start" font-weight="700">02  DATA AS A PRODUCT</text><text x="110" y="127" font-size="12" fill="#3a3a3a" text-anchor="start">Products are discoverable, addressable, trustworthy, and self-describing — consumers find and depend on them without a broker.</text><text x="90" y="180" font-size="10" fill="#8a7a5a" text-anchor="start" font-weight="600">REALIZED BY — the reference-implementation pieces</text><rect x="90" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="102" y="212" width="200" height="26" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="202" y="229" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">Deployment + Service</text><text x="104" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">the product as a</text><text x="104" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">deployable artifact</text><rect x="345" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="357" y="212" width="200" height="26" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="457" y="229" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">schema registry</text><text x="359" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">versioned contracts;</text><text x="359" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">rejects breaking changes</text><rect x="600" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="612" y="212" width="200" height="26" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="712" y="229" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">OpenMetadata</text><text x="614" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">catalog: discovery</text><text x="614" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">+ lineage graph</text><rect x="855" y="200" width="235" height="110" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><rect x="867" y="212" width="200" height="26" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="967" y="229" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">CRDs</text><text x="869" y="258" font-size="10.5" fill="#3a3a3a" text-anchor="start">domain-specific types,</text><text x="869" y="273" font-size="10.5" fill="#3a3a3a" text-anchor="start">declared like any object</text><rect x="90" y="340" width="1000" height="60" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="110" y="366" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">WITHOUT IT</text><text x="110" y="386" font-size="11.5" fill="#3a3a3a" text-anchor="start">"Dumb" data products — renamed tables that can't serve, govern, or describe themselves; governance has nowhere to live.</text><text x="590" y="524" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Products are discoverable, addressable, trustworthy, and self-describing — consumers find and depend on them without a broker.</text></svg>