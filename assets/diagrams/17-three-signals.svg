<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="560" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Metrics, logs, and traces — correlated across a domain</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">One request touches three products; correlation is what makes the whole legible</text><text x="90" y="95" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">ONE REQUEST, ONE TRACE</text><rect x="90" y="105" width="1000" height="34" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="590" y="127" font-size="10.5" fill="#3a3a3a" text-anchor="middle" font-weight="700">HTTP server span — GraphQL query @ gateway</text><rect x="150" y="145" width="430" height="34" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="365" y="167" font-size="10.5" fill="#3a3a3a" text-anchor="middle" font-weight="700">REST client span → order-service</text><rect x="610" y="145" width="360" height="34" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="790" y="167" font-size="10.5" fill="#3a3a3a" text-anchor="middle" font-weight="700">gRPC client span → inventory-service</text><text x="90" y="205" font-size="10" fill="#666666" text-anchor="start" font-style="italic">trace id propagates across every product boundary</text><rect x="90" y="250" width="320" height="230" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="250" y="278" font-size="13" fill="#2a5a1a" text-anchor="middle" font-weight="700">METRICS</text><text x="110" y="308" font-size="10.5" fill="#3a3a3a" text-anchor="start">• request rate, errors, p99 latency</text><text x="110" y="327" font-size="10.5" fill="#3a3a3a" text-anchor="start">• consumer-group lag</text><text x="110" y="346" font-size="10.5" fill="#3a3a3a" text-anchor="start">• replica count (autoscaler)</text><text x="110" y="365" font-size="10.5" fill="#3a3a3a" text-anchor="start"></text><text x="110" y="384" font-size="10.5" fill="#3a3a3a" text-anchor="start">answers: is it slow / failing,</text><text x="110" y="403" font-size="10.5" fill="#3a3a3a" text-anchor="start">and is the platform reacting?</text><rect x="430" y="250" width="320" height="230" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="590" y="278" font-size="13" fill="#7a3a0a" text-anchor="middle" font-weight="700">TRACES</text><text x="450" y="308" font-size="10.5" fill="#3a3a3a" text-anchor="start">• the span tree above</text><text x="450" y="327" font-size="10.5" fill="#3a3a3a" text-anchor="start">• per-hop timing across products</text><text x="450" y="346" font-size="10.5" fill="#3a3a3a" text-anchor="start">• which downstream call was slow</text><text x="450" y="365" font-size="10.5" fill="#3a3a3a" text-anchor="start"></text><text x="450" y="384" font-size="10.5" fill="#3a3a3a" text-anchor="start">answers: WHERE in the path</text><text x="450" y="403" font-size="10.5" fill="#3a3a3a" text-anchor="start">did the time or error come from?</text><rect x="770" y="250" width="320" height="230" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="930" y="278" font-size="13" fill="#1a3a6a" text-anchor="middle" font-weight="700">LOGS</text><text x="790" y="308" font-size="10.5" fill="#3a3a3a" text-anchor="start">• the detailed per-event record</text><text x="790" y="327" font-size="10.5" fill="#3a3a3a" text-anchor="start">• emitted with the same trace id</text><text x="790" y="346" font-size="10.5" fill="#3a3a3a" text-anchor="start">• reached for once you know where</text><text x="790" y="365" font-size="10.5" fill="#3a3a3a" text-anchor="start"></text><text x="790" y="384" font-size="10.5" fill="#3a3a3a" text-anchor="start">answers: exactly WHAT happened</text><text x="790" y="403" font-size="10.5" fill="#3a3a3a" text-anchor="start">at the point of interest</text><rect x="90" y="500" width="1000" height="42" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="110" y="526" font-size="11.5" fill="#a8331f" text-anchor="start" font-weight="700">Correlation id (trace id) stamped on all three:</text><text x="560" y="526" font-size="10.5" fill="#3a3a3a" text-anchor="start">jump from a latency spike (metric) → the slow trace → the exact log line — across the whole domain.</text></svg>