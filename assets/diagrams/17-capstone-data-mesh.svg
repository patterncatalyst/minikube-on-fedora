<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    .lane-bg { fill: #fdfbf7; stroke: #e0d8c8; stroke-width: 1; }
    .lane-label { font-size: 12px; fill: #8a7a5a; letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase; }
    .service-box { fill: #e8eef7; stroke: #2c5aa0; stroke-width: 1.5; rx: 4; }
    .service-label { font-size: 13px; fill: #1a3a6a; font-weight: 600; }
    .sidecar-box { fill: #f5edd6; stroke: #c19a6b; stroke-width: 1; rx: 3; }
    .sidecar-label { font-size: 9px; fill: #7a5a2a; font-family: 'SF Mono', Menlo, monospace; }
    .platform-box { fill: #f5edd6; stroke: #c19a6b; stroke-width: 1.5; rx: 4; }
    .platform-label { font-size: 12px; fill: #5a3a0a; font-weight: 600; }
    .platform-sublabel { font-size: 10px; fill: #7a5a2a; font-family: 'SF Mono', Menlo, monospace; }
    .control-box { fill: #e8f0e0; stroke: #5a8a3a; stroke-width: 1.5; rx: 4; }
    .control-label { font-size: 12px; fill: #2a5a1a; font-weight: 600; }
    .client-box { fill: #efefef; stroke: #4a4a4a; stroke-width: 1; rx: 3; }
    .client-label { font-size: 11px; fill: #2a2a2a; }
    .gateway-box { fill: #fbe8d8; stroke: #c97a3a; stroke-width: 1.5; rx: 4; }
    .gateway-label { font-size: 12px; fill: #7a3a0a; font-weight: 600; }
    .legend-text { font-size: 11px; fill: #4a4a4a; }
    .legend-mono { font-size: 10px; fill: #4a4a4a; font-family: 'SF Mono', Menlo, monospace; }
    .arrow-rest { stroke: #2c5aa0; stroke-width: 1.5; fill: none; }
    .arrow-grpc { stroke: #5a8a3a; stroke-width: 1.5; stroke-dasharray: 5,3; fill: none; }
    .arrow-graphql { stroke: #c97a3a; stroke-width: 1.5; stroke-dasharray: 2,3; fill: none; }
    .arrow-kafka { stroke: #c14a3a; stroke-width: 1.5; fill: none; }
    .arrow-otel { stroke: #6a4a8a; stroke-width: 1; stroke-dasharray: 1,2; fill: none; }
    .arrow-label { font-size: 10px; fill: #4a4a4a; font-family: 'SF Mono', Menlo, monospace; }
    .section-title { font-size: 16px; fill: #2a2a2a; font-weight: 700; }
    .principle-text { font-size: 10px; fill: #6a5a3a; font-style: italic; }
  </style>

  <!-- Arrow markers for each protocol -->
  <defs>
    <marker id="arrow-rest-head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0,0 L 10,5 L 0,10 z" fill="#2c5aa0"/>
    </marker>
    <marker id="arrow-grpc-head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0,0 L 10,5 L 0,10 z" fill="#5a8a3a"/>
    </marker>
    <marker id="arrow-graphql-head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0,0 L 10,5 L 0,10 z" fill="#c97a3a"/>
    </marker>
    <marker id="arrow-kafka-head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0,0 L 10,5 L 0,10 z" fill="#c14a3a"/>
    </marker>
    <marker id="arrow-otel-head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0,0 L 10,5 L 0,10 z" fill="#6a4a8a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" class="section-title">§17 Capstone — A data mesh on minikube</text>

  <!-- ========== EXTERNAL CLIENTS lane ========== -->
  <rect x="20" y="50" width="1160" height="80" class="lane-bg"/>
  <text x="32" y="66" class="lane-label">External clients</text>

  <rect x="100" y="78" width="120" height="40" class="client-box"/>
  <text x="160" y="103" text-anchor="middle" class="client-label">Browser</text>

  <rect x="280" y="78" width="120" height="40" class="client-box"/>
  <text x="340" y="103" text-anchor="middle" class="client-label">curl / Postman</text>

  <rect x="460" y="78" width="120" height="40" class="client-box"/>
  <text x="520" y="103" text-anchor="middle" class="client-label">hey (load-gen)</text>

  <rect x="640" y="78" width="160" height="40" class="client-box"/>
  <text x="720" y="103" text-anchor="middle" class="client-label">GraphQL Playground</text>

  <rect x="860" y="78" width="120" height="40" class="client-box"/>
  <text x="920" y="103" text-anchor="middle" class="client-label">ghz (gRPC)</text>

  <!-- ========== INGRESS lane ========== -->
  <rect x="20" y="150" width="1160" height="70" class="lane-bg"/>
  <text x="32" y="166" class="lane-label">Ingress</text>

  <rect x="300" y="170" width="200" height="40" class="gateway-box"/>
  <text x="400" y="194" text-anchor="middle" class="gateway-label">Istio Ingress Gateway</text>

  <rect x="700" y="170" width="200" height="40" class="gateway-box"/>
  <text x="800" y="188" text-anchor="middle" class="gateway-label">GraphQL Federation</text>
  <text x="800" y="202" text-anchor="middle" class="platform-sublabel">Strawberry · Python</text>

  <!-- Client arrows to ingress -->
  <line x1="160" y1="118" x2="380" y2="170" class="arrow-rest" marker-end="url(#arrow-rest-head)"/>
  <line x1="340" y1="118" x2="400" y2="170" class="arrow-rest" marker-end="url(#arrow-rest-head)"/>
  <line x1="520" y1="118" x2="420" y2="170" class="arrow-rest" marker-end="url(#arrow-rest-head)"/>
  <line x1="720" y1="118" x2="800" y2="170" class="arrow-graphql" marker-end="url(#arrow-graphql-head)"/>
  <line x1="920" y1="118" x2="880" y2="170" class="arrow-grpc" marker-end="url(#arrow-grpc-head)"/>

  <!-- ========== MESH lane (services) ========== -->
  <rect x="20" y="240" width="1160" height="200" class="lane-bg"/>
  <text x="32" y="256" class="lane-label">Service mesh (Istio)</text>

  <!-- order-service -->
  <rect x="70" y="280" width="160" height="100" class="service-box"/>
  <text x="150" y="305" text-anchor="middle" class="service-label">order-service</text>
  <text x="150" y="322" text-anchor="middle" class="platform-sublabel">FastAPI · Python</text>
  <rect x="80" y="335" width="140" height="34" class="sidecar-box"/>
  <text x="150" y="349" text-anchor="middle" class="sidecar-label">istio-proxy (Envoy)</text>
  <text x="150" y="361" text-anchor="middle" class="sidecar-label">+ OTEL client</text>

  <!-- inventory-service -->
  <rect x="280" y="280" width="160" height="100" class="service-box"/>
  <text x="360" y="305" text-anchor="middle" class="service-label">inventory-service</text>
  <text x="360" y="322" text-anchor="middle" class="platform-sublabel">FastAPI · Python</text>
  <rect x="290" y="335" width="140" height="34" class="sidecar-box"/>
  <text x="360" y="349" text-anchor="middle" class="sidecar-label">istio-proxy (Envoy)</text>
  <text x="360" y="361" text-anchor="middle" class="sidecar-label">+ OTEL client</text>

  <!-- payment-service -->
  <rect x="490" y="280" width="160" height="100" class="service-box"/>
  <text x="570" y="305" text-anchor="middle" class="service-label">payment-service</text>
  <text x="570" y="322" text-anchor="middle" class="platform-sublabel">FastAPI · Python</text>
  <rect x="500" y="335" width="140" height="34" class="sidecar-box"/>
  <text x="570" y="349" text-anchor="middle" class="sidecar-label">istio-proxy (Envoy)</text>
  <text x="570" y="361" text-anchor="middle" class="sidecar-label">+ OTEL client</text>

  <!-- shipping-service -->
  <rect x="700" y="280" width="160" height="100" class="service-box"/>
  <text x="780" y="305" text-anchor="middle" class="service-label">shipping-service</text>
  <text x="780" y="322" text-anchor="middle" class="platform-sublabel">FastAPI · Python</text>
  <rect x="710" y="335" width="140" height="34" class="sidecar-box"/>
  <text x="780" y="349" text-anchor="middle" class="sidecar-label">istio-proxy (Envoy)</text>
  <text x="780" y="361" text-anchor="middle" class="sidecar-label">+ OTEL client</text>

  <!-- notification-service -->
  <rect x="910" y="280" width="180" height="100" class="service-box"/>
  <text x="1000" y="305" text-anchor="middle" class="service-label">notification-service</text>
  <text x="1000" y="322" text-anchor="middle" class="platform-sublabel">FastAPI · Python · Kafka only</text>
  <rect x="920" y="335" width="160" height="34" class="sidecar-box"/>
  <text x="1000" y="349" text-anchor="middle" class="sidecar-label">istio-proxy (Envoy)</text>
  <text x="1000" y="361" text-anchor="middle" class="sidecar-label">+ OTEL client</text>

  <!-- gRPC arrows between services -->
  <line x1="230" y1="320" x2="280" y2="320" class="arrow-grpc" marker-end="url(#arrow-grpc-head)"/>
  <line x1="150" y1="380" x2="150" y2="400" class="arrow-grpc"/>
  <line x1="150" y1="400" x2="570" y2="400" class="arrow-grpc"/>
  <line x1="570" y1="400" x2="570" y2="380" class="arrow-grpc" marker-end="url(#arrow-grpc-head)"/>
  <line x1="150" y1="380" x2="150" y2="415" class="arrow-grpc"/>
  <line x1="150" y1="415" x2="780" y2="415" class="arrow-grpc"/>
  <line x1="780" y1="415" x2="780" y2="380" class="arrow-grpc" marker-end="url(#arrow-grpc-head)"/>

  <!-- gRPC label -->
  <text x="350" y="334" class="arrow-label" fill="#5a8a3a">gRPC (internal)</text>

  <!-- Ingress → order-service (REST) -->
  <line x1="380" y1="210" x2="200" y2="280" class="arrow-rest" marker-end="url(#arrow-rest-head)"/>
  <text x="245" y="252" class="arrow-label" fill="#2c5aa0">REST</text>

  <!-- GraphQL Gateway → services -->
  <line x1="780" y1="210" x2="180" y2="280" class="arrow-graphql" marker-end="url(#arrow-graphql-head)"/>
  <line x1="800" y1="210" x2="380" y2="280" class="arrow-graphql"/>
  <line x1="810" y1="210" x2="580" y2="280" class="arrow-graphql"/>
  <line x1="820" y1="210" x2="780" y2="280" class="arrow-graphql" marker-end="url(#arrow-graphql-head)"/>
  <text x="660" y="252" class="arrow-label" fill="#c97a3a">GraphQL (federation)</text>

  <!-- ========== PLATFORM lane ========== -->
  <rect x="20" y="460" width="1160" height="190" class="lane-bg"/>
  <text x="32" y="476" class="lane-label">Self-serve platform</text>

  <!-- Kafka -->
  <rect x="50" y="490" width="160" height="60" class="platform-box"/>
  <text x="130" y="513" text-anchor="middle" class="platform-label">Kafka</text>
  <text x="130" y="529" text-anchor="middle" class="platform-sublabel">Strimzi 0.51 · 4.1.0</text>
  <text x="130" y="544" text-anchor="middle" class="platform-sublabel">Kraft (no ZK)</text>

  <!-- Apicurio -->
  <rect x="230" y="490" width="160" height="60" class="platform-box"/>
  <text x="310" y="513" text-anchor="middle" class="platform-label">Apicurio Registry</text>
  <text x="310" y="529" text-anchor="middle" class="platform-sublabel">OpenAPI · proto</text>
  <text x="310" y="544" text-anchor="middle" class="platform-sublabel">Avro · JSON schemas</text>

  <!-- OpenMetadata -->
  <rect x="410" y="490" width="160" height="60" class="platform-box"/>
  <text x="490" y="513" text-anchor="middle" class="platform-label">OpenMetadata</text>
  <text x="490" y="529" text-anchor="middle" class="platform-sublabel">data products</text>
  <text x="490" y="544" text-anchor="middle" class="platform-sublabel">lineage · catalog</text>

  <!-- Postgres -->
  <rect x="590" y="490" width="160" height="60" class="platform-box"/>
  <text x="670" y="513" text-anchor="middle" class="platform-label">PostgreSQL</text>
  <text x="670" y="529" text-anchor="middle" class="platform-sublabel">one cluster ·</text>
  <text x="670" y="544" text-anchor="middle" class="platform-sublabel">schema per service</text>

  <!-- KEDA -->
  <rect x="770" y="490" width="180" height="60" class="control-box"/>
  <text x="860" y="513" text-anchor="middle" class="control-label">KEDA</text>
  <text x="860" y="529" text-anchor="middle" class="platform-sublabel">HTTP add-on (REST scaling)</text>
  <text x="860" y="544" text-anchor="middle" class="platform-sublabel">Kafka lag (consumer scaling)</text>

  <!-- Prefect -->
  <rect x="970" y="490" width="180" height="60" class="platform-box"/>
  <text x="1060" y="513" text-anchor="middle" class="platform-label">Prefect (OSS)</text>
  <text x="1060" y="529" text-anchor="middle" class="platform-sublabel">scheduled flows</text>
  <text x="1060" y="544" text-anchor="middle" class="platform-sublabel">nightly reconciliation</text>

  <!-- Observability row -->
  <rect x="50" y="570" width="160" height="60" class="platform-box"/>
  <text x="130" y="593" text-anchor="middle" class="platform-label">OTEL Collector</text>
  <text x="130" y="609" text-anchor="middle" class="platform-sublabel">OTLP receiver</text>
  <text x="130" y="624" text-anchor="middle" class="platform-sublabel">→ Prometheus, Tempo</text>

  <rect x="230" y="570" width="120" height="60" class="platform-box"/>
  <text x="290" y="595" text-anchor="middle" class="platform-label">Prometheus</text>
  <text x="290" y="615" text-anchor="middle" class="platform-sublabel">metrics</text>

  <rect x="370" y="570" width="120" height="60" class="platform-box"/>
  <text x="430" y="595" text-anchor="middle" class="platform-label">Tempo</text>
  <text x="430" y="615" text-anchor="middle" class="platform-sublabel">traces</text>

  <rect x="510" y="570" width="120" height="60" class="platform-box"/>
  <text x="570" y="595" text-anchor="middle" class="platform-label">Grafana</text>
  <text x="570" y="615" text-anchor="middle" class="platform-sublabel">dashboards</text>

  <rect x="650" y="570" width="120" height="60" class="platform-box"/>
  <text x="710" y="595" text-anchor="middle" class="platform-label">Kiali</text>
  <text x="710" y="615" text-anchor="middle" class="platform-sublabel">mesh viz</text>

  <rect x="790" y="570" width="160" height="60" class="control-box"/>
  <text x="870" y="593" text-anchor="middle" class="control-label">istiod</text>
  <text x="870" y="609" text-anchor="middle" class="platform-sublabel">control plane</text>
  <text x="870" y="624" text-anchor="middle" class="platform-sublabel">mTLS + routing</text>

  <!-- Kafka arrows up to services -->
  <line x1="130" y1="490" x2="150" y2="380" class="arrow-kafka" marker-end="url(#arrow-kafka-head)"/>
  <line x1="160" y1="490" x2="360" y2="380" class="arrow-kafka" marker-end="url(#arrow-kafka-head)"/>
  <line x1="170" y1="490" x2="570" y2="380" class="arrow-kafka" marker-end="url(#arrow-kafka-head)"/>
  <line x1="180" y1="490" x2="780" y2="380" class="arrow-kafka" marker-end="url(#arrow-kafka-head)"/>
  <line x1="190" y1="490" x2="1000" y2="380" class="arrow-kafka" marker-end="url(#arrow-kafka-head)"/>
  <text x="60" y="488" class="arrow-label" fill="#c14a3a">Kafka topics</text>

  <!-- OTEL arrows from services down -->
  <line x1="150" y1="380" x2="130" y2="570" class="arrow-otel" marker-end="url(#arrow-otel-head)"/>
  <line x1="360" y1="380" x2="130" y2="572" class="arrow-otel" marker-end="url(#arrow-otel-head)"/>
  <line x1="570" y1="380" x2="130" y2="574" class="arrow-otel" marker-end="url(#arrow-otel-head)"/>
  <line x1="780" y1="380" x2="130" y2="576" class="arrow-otel" marker-end="url(#arrow-otel-head)"/>
  <line x1="1000" y1="380" x2="130" y2="578" class="arrow-otel" marker-end="url(#arrow-otel-head)"/>
  <text x="40" y="568" class="arrow-label" fill="#6a4a8a">OTLP traces+metrics</text>

  <!-- ========== LEGEND ========== -->
  <rect x="20" y="670" width="1160" height="80" class="lane-bg"/>
  <text x="32" y="686" class="lane-label">Protocol legend &amp; data-mesh principles</text>

  <line x1="50" y1="704" x2="100" y2="704" class="arrow-rest" marker-end="url(#arrow-rest-head)"/>
  <text x="108" y="708" class="legend-text">REST (external)</text>

  <line x1="240" y1="704" x2="290" y2="704" class="arrow-grpc" marker-end="url(#arrow-grpc-head)"/>
  <text x="298" y="708" class="legend-text">gRPC (internal sync)</text>

  <line x1="450" y1="704" x2="500" y2="704" class="arrow-graphql" marker-end="url(#arrow-graphql-head)"/>
  <text x="508" y="708" class="legend-text">GraphQL (federation)</text>

  <line x1="680" y1="704" x2="730" y2="704" class="arrow-kafka" marker-end="url(#arrow-kafka-head)"/>
  <text x="738" y="708" class="legend-text">Kafka (events)</text>

  <line x1="880" y1="704" x2="930" y2="704" class="arrow-otel" marker-end="url(#arrow-otel-head)"/>
  <text x="938" y="708" class="legend-text">OTLP (observability)</text>

  <text x="50" y="734" class="principle-text">Domain ownership · Data as product · Self-serve platform · Federated computational governance — Dehghani 2022</text>
</svg>
