<svg width="100%" viewBox="0 0 920 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" font-size="14">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 L 0 40" fill="none" stroke="#ebe5d6" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5e5e5e"/>
    </marker>
  </defs>
  <style>
    .blue    { fill: #dbe6f1; stroke: #4a7bb8; stroke-width: 1.5; }
    .tan     { fill: #ebe1cc; stroke: #a08456; stroke-width: 1.5; }
    .neutral { fill: #ebebe5; stroke: #5e5e5e; stroke-width: 1.2; }
    .label    { fill: #2c2c2c; }
    .sublabel { fill: #5e5e5e; font-size: 11px; }
    .title    { fill: #2c2c2c; font-weight: 600; font-size: 16px; }
    .mono     { font-family: ui-monospace, SFMono-Regular, Menlo, "Courier New", monospace; font-size: 12px; fill: #2c2c2c; }
    .arrow    { stroke: #5e5e5e; stroke-width: 1.5; fill: none; }
    .divider  { stroke: #c4baa8; stroke-width: 1; stroke-dasharray: 4 4; }
    .footnote { fill: #5e5e5e; font-size: 11px; font-style: italic; }
  </style>

  <rect width="920" height="500" fill="#fdfbf7"/>
  <rect width="920" height="500" fill="url(#grid)"/>

  <text x="230" y="40" text-anchor="middle" class="title">Horizontal Pod Autoscaler (HPA)</text>
  <text x="230" y="60" text-anchor="middle" class="sublabel">scales on Pod-internal metrics (CPU, memory)</text>

  <rect x="50" y="100" width="140" height="56" rx="4" class="blue"/>
  <text x="120" y="124" text-anchor="middle" class="label">Pods</text>
  <text x="120" y="142" text-anchor="middle" class="sublabel">CPU / memory usage</text>

  <rect x="270" y="100" width="160" height="56" rx="4" class="neutral"/>
  <text x="350" y="124" text-anchor="middle" class="label">metrics-server</text>
  <text x="350" y="142" text-anchor="middle" class="sublabel">aggregates kubelet stats</text>

  <rect x="135" y="220" width="190" height="56" rx="4" class="neutral"/>
  <text x="230" y="244" text-anchor="middle" class="label">HPA controller</text>
  <text x="230" y="262" text-anchor="middle" class="sublabel">Resource Metrics API</text>

  <rect x="135" y="340" width="190" height="56" rx="4" class="blue"/>
  <text x="230" y="364" text-anchor="middle" class="label">Deployment</text>
  <text x="230" y="384" text-anchor="middle" class="mono">replicas: 1 ↔ N</text>

  <path d="M 190 128 L 266 128" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 350 160 Q 350 200 280 220" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 230 278 L 230 336" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 135 365 Q 30 365 30 128 L 46 128" class="arrow" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="22" y="246" class="sublabel" transform="rotate(-90 22 246)">scale</text>

  <text x="230" y="438" text-anchor="middle" class="footnote">Pods must be running to report CPU —</text>
  <text x="230" y="455" text-anchor="middle" class="footnote">HPA cannot scale to zero.</text>

  <line x1="460" y1="80" x2="460" y2="470" class="divider"/>

  <text x="690" y="40" text-anchor="middle" class="title">KEDA</text>
  <text x="690" y="60" text-anchor="middle" class="sublabel">scales on external events; supports scale-to-zero</text>

  <rect x="500" y="92" width="160" height="72" rx="4" class="tan"/>
  <text x="580" y="116" text-anchor="middle" class="label">External event</text>
  <text x="580" y="134" text-anchor="middle" class="sublabel">Kafka lag, HTTP queue,</text>
  <text x="580" y="150" text-anchor="middle" class="sublabel">cron, Prometheus query…</text>

  <rect x="710" y="92" width="170" height="72" rx="4" class="neutral"/>
  <text x="795" y="116" text-anchor="middle" class="label">KEDA operator</text>
  <text x="795" y="134" text-anchor="middle" class="sublabel">reconciles</text>
  <text x="795" y="152" text-anchor="middle" class="mono">ScaledObject</text>

  <rect x="710" y="190" width="170" height="56" rx="4" class="neutral"/>
  <text x="795" y="214" text-anchor="middle" class="label">KEDA</text>
  <text x="795" y="232" text-anchor="middle" class="sublabel">metrics-apiserver</text>

  <rect x="595" y="280" width="190" height="56" rx="4" class="neutral"/>
  <text x="690" y="304" text-anchor="middle" class="label">HPA</text>
  <text x="690" y="322" text-anchor="middle" class="sublabel">External Metrics API</text>

  <rect x="595" y="380" width="190" height="56" rx="4" class="blue"/>
  <text x="690" y="404" text-anchor="middle" class="label">Deployment</text>
  <text x="690" y="424" text-anchor="middle" class="mono">replicas: 0 ↔ N</text>

  <path d="M 660 128 L 706 128" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 795 164 L 795 186" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 770 246 Q 730 270 730 276" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 690 336 L 690 376" class="arrow" marker-end="url(#arrow)"/>

  <text x="690" y="468" text-anchor="middle" class="footnote">Idle &gt; cooldownPeriod → scale to 0; KEDA deletes the HPA until the next event.</text>
</svg>
