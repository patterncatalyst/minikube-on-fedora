# Build and deploy the Jekyll site to GitHub Pages on every push to main.
# Uses the Jekyll version pinned in the Gemfile, not GitHub Pages' built-in
# Jekyll 3.10. Switch the repo's Pages source to "GitHub Actions" (Settings
# → Pages → Build and deployment → Source) for this workflow to take effect.

name: Build and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:    # lets you re-run from the Actions UI

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs if a new push comes in for the same ref.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true     # caches Gemfile.lock deps automatically

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        # The --baseurl flag here is what tells Jekyll to render absolute
        # URLs as /<repo-name>/ when the site lives under a project Pages URL.
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        # actions/configure-pages already points this at _site/.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
