<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="520" fill="#ffffff"/><defs><marker id="mk_5a8a3a_solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker><marker id="mk_c19a6b_dotted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c19a6b"/></marker></defs><text x="590.0" y="30" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">The federated computational governance model</text><text x="590.0" y="49" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">a guild sets global rules; the platform enforces them automatically</text><rect x="360" y="80" width="460" height="80" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="590.0" y="106.0" font-size="14" fill="#2a5a1a" text-anchor="middle" font-weight="600">Federated guild</text><text x="590.0" y="122.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">domain data-product owners + platform owners</text><text x="590.0" y="134.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">autonomy + domain-local decisions, global rules</text><rect x="360" y="200" width="460" height="56" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="590.0" y="220.25" font-size="12" fill="#2a5a1a" text-anchor="middle" font-weight="600">Global policies / standards</text><text x="590.0" y="234.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">interoperability · security · documentation · compliance</text><polyline points="590,160 590,200" fill="none" stroke="#5a8a3a" stroke-width="1.5" marker-end="url(#mk_5a8a3a_solid)"/><rect x="360" y="296" width="460" height="56" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="590.0" y="316.25" font-size="12" fill="#5a3a0a" text-anchor="middle" font-weight="600">Platform — computational enforcement</text><text x="590.0" y="330.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">policy-as-code baked into the self-serve platform</text><polyline points="590,256 590,296" fill="none" stroke="#5a8a3a" stroke-width="1.5" marker-end="url(#mk_5a8a3a_solid)"/><rect x="200" y="400" width="160" height="56" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="280.0" y="420.25" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="600">Domain A</text><text x="280.0" y="434.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">follows the standard</text><polyline points="590,352 280,400" fill="none" stroke="#c19a6b" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#mk_c19a6b_dotted)"/><rect x="510" y="400" width="160" height="56" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="590.0" y="420.25" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="600">Domain B</text><text x="590.0" y="434.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">follows the standard</text><polyline points="590,352 590,400" fill="none" stroke="#c19a6b" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#mk_c19a6b_dotted)"/><rect x="820" y="400" width="160" height="56" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="900.0" y="420.25" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="600">Domain C</text><text x="900.0" y="434.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">follows the standard</text><polyline points="590,352 900,400" fill="none" stroke="#c19a6b" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#mk_c19a6b_dotted)"/><text x="590.0" y="490" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Equilibrium between centralization and decentralization — rules are computational, not paperwork.</text></svg>