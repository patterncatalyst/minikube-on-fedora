<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="600" fill="#ffffff"/><defs><marker id="mk_5a8a3a_dotted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker><marker id="mk_c14a3a_solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker><marker id="mk_c19a6b_dotted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c19a6b"/></marker></defs><text x="590" y="30" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">How a contract flows: runtime path vs discovery path</text><text x="590" y="49" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">two different jobs the registry does, with very different coupling</text><rect x="20" y="66" width="1140" height="220" fill="#fdf0ec" stroke="#e3b5aa" stroke-width="1.5" rx="6"/><text x="40" y="90" font-size="13" fill="#c14a3a" text-anchor="start" font-weight="600">Runtime path — Avro event serialization (hot, online)</text><text x="40" y="108" font-size="11" fill="#8a4a3a" text-anchor="start" font-style="italic">the event will not encode or decode without the registered schema</text><rect x="470" y="124" width="240" height="50" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="590.0" y="141.25" font-size="12" fill="#5a3a0a" text-anchor="middle" font-weight="600">Apicurio Registry</text><text x="590.0" y="155.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">order.placed · Avro v1 (compat-checked)</text><rect x="60" y="200" width="250" height="60" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="185.0" y="222.0" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="600">order-service (producer)</text><text x="185.0" y="236.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">serialize order.placed → bytes</text><rect x="470" y="200" width="240" height="60" fill="#f5edd6" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="590.0" y="222.0" font-size="12" fill="#c14a3a" text-anchor="middle" font-weight="600">Kafka topic: order-placed</text><text x="590.0" y="236.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">Avro bytes + schema id</text><rect x="870" y="200" width="250" height="60" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="995.0" y="222.0" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="600">notification-service (consumer)</text><text x="995.0" y="236.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">deserialize bytes → event</text><polyline points="185,200 520,174" fill="none" stroke="#c19a6b" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#mk_c19a6b_dotted)"/><text x="300" y="188" font-size="10" fill="#666666" text-anchor="start" font-family="'SF Mono', Menlo, monospace">① register / fetch schema</text><polyline points="310,230 470,230" fill="none" stroke="#c14a3a" stroke-width="1.5" marker-end="url(#mk_c14a3a_solid)"/><text x="390" y="222" font-size="10" fill="#c14a3a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">② produce</text><polyline points="710,230 870,230" fill="none" stroke="#c14a3a" stroke-width="1.5" marker-end="url(#mk_c14a3a_solid)"/><text x="790" y="222" font-size="10" fill="#c14a3a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">④ consume</text><polyline points="950,200 650,174" fill="none" stroke="#c19a6b" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#mk_c19a6b_dotted)"/><text x="860" y="188" font-size="10" fill="#666666" text-anchor="start" font-family="'SF Mono', Menlo, monospace">③ fetch schema by id</text><rect x="20" y="300" width="1140" height="280" fill="#fdfbf7" stroke="#e0d8c8" stroke-width="1"/><text x="40" y="324" font-size="13" fill="#2a5a1a" text-anchor="start" font-weight="600">Discovery path — publish contracts, ingest into the catalog (offline)</text><text x="40" y="342" font-size="11" fill="#666666" text-anchor="start" font-style="italic">nothing fails at runtime if absent; this exists to be discovered — by people, CI, and OpenMetadata</text><rect x="50" y="362" width="280" height="120" fill="#ffffff" stroke="#9a9a9a" stroke-width="1.5" rx="6"/><text x="190.0" y="397.0" font-size="12" fill="#3a3a3a" text-anchor="middle" font-weight="600">services publish their contracts</text><text x="190.0" y="411.0" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">OpenAPI  (FastAPI /openapi.json)</text><text x="190.0" y="422.5" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">Protobuf (.proto definitions)</text><text x="190.0" y="434.0" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">GraphQL  SDL (gateway schema)</text><text x="190.0" y="445.5" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">Avro     (also registered, runtime)</text><rect x="450" y="380" width="260" height="84" fill="#fbf3e0" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="580.0" y="408.0" font-size="13" fill="#5a3a0a" text-anchor="middle" font-weight="600">Apicurio Registry</text><text x="580.0" y="423.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">all four contract types,</text><text x="580.0" y="435.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">versioned + compatibility rules</text><rect x="820" y="380" width="300" height="84" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="970.0" y="408.0" font-size="13" fill="#2a5a1a" text-anchor="middle" font-weight="600">OpenMetadata</text><text x="970.0" y="423.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">ingests &amp; builds lineage:</text><text x="970.0" y="435.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">who produces / who consumes</text><polyline points="330,422 450,422" fill="none" stroke="#c19a6b" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#mk_c19a6b_dotted)"/><text x="390" y="414" font-size="10" fill="#666666" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">⑤ publish</text><polyline points="710,422 820,422" fill="none" stroke="#5a8a3a" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#mk_5a8a3a_dotted)"/><text x="765" y="414" font-size="10" fill="#2a5a1a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">⑦ ingest</text><rect x="450" y="500" width="130" height="56" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="515.0" y="520.5" font-size="11" fill="#5a3a0a" text-anchor="middle" font-weight="600">Postgres</text><text x="515.0" y="533.5" font-size="9" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">(CNPG)</text><rect x="600" y="500" width="130" height="56" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="665.0" y="520.5" font-size="11" fill="#5a3a0a" text-anchor="middle" font-weight="600">Kafka topics</text><text x="665.0" y="533.5" font-size="9" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">(Strimzi)</text><polyline points="640,500 900,464" fill="none" stroke="#5a8a3a" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#mk_5a8a3a_dotted)"/><text x="700" y="492" font-size="10" fill="#666666" text-anchor="start" font-family="'SF Mono', Menlo, monospace">⑥ ingest data sources (schemas, topics)</text><text x="970" y="500" font-size="10" fill="#2a5a1a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">⑧ lineage: order → order.placed → notification</text></svg>