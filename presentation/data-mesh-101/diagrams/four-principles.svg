<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 540" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="540" fill="#ffffff"/><defs></defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">The four principles — and how they map in practice</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Zhamak Dehghani, Data Mesh (O&#x27;Reilly, 2022)</text><rect x="30" y="86" width="270" height="360" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="48" y="118" font-size="13.5" fill="#1a3a6a" text-anchor="start" font-weight="700">1  Domain ownership</text><text x="48" y="146" font-size="11" fill="#3a3a3a" text-anchor="start">Each domain owns its data end-to-end</text><text x="48" y="163" font-size="11" fill="#3a3a3a" text-anchor="start">— schema, lifecycle, evolution. No</text><text x="48" y="180" font-size="11" fill="#3a3a3a" text-anchor="start">central data team owns the</text><text x="48" y="197" font-size="11" fill="#3a3a3a" text-anchor="start">warehouse.</text><text x="48" y="230" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">ON KUBERNETES / OPENSHIFT</text><text x="48" y="252" font-size="10.5" fill="#1a3a6a" text-anchor="start">• one bounded context per domain</text><text x="48" y="280" font-size="10.5" fill="#1a3a6a" text-anchor="start">• a schema / store per domain</text><text x="48" y="308" font-size="10.5" fill="#1a3a6a" text-anchor="start">• Namespaces + ServiceAccounts + RBAC</text><rect x="316" y="86" width="270" height="360" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="334" y="118" font-size="13.5" fill="#7a3a0a" text-anchor="start" font-weight="700">2  Data as a product</text><text x="334" y="146" font-size="11" fill="#3a3a3a" text-anchor="start">A data product is discoverable,</text><text x="334" y="163" font-size="11" fill="#3a3a3a" text-anchor="start">addressable, trustworthy,</text><text x="334" y="180" font-size="11" fill="#3a3a3a" text-anchor="start">self-describing, interoperable and</text><text x="334" y="197" font-size="11" fill="#3a3a3a" text-anchor="start">secure.</text><text x="334" y="230" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">ON KUBERNETES / OPENSHIFT</text><text x="334" y="252" font-size="10.5" fill="#7a3a0a" text-anchor="start">• each product = Service + Deployment</text><text x="334" y="280" font-size="10.5" fill="#7a3a0a" text-anchor="start">• contract in a schema registry</text><text x="334" y="308" font-size="10.5" fill="#7a3a0a" text-anchor="start">• catalog: metadata + lineage</text><rect x="602" y="86" width="270" height="360" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="620" y="118" font-size="13.5" fill="#5a3a0a" text-anchor="start" font-weight="700">3  Self-serve data platform</text><text x="620" y="146" font-size="11" fill="#3a3a3a" text-anchor="start">Shared infrastructure domains</text><text x="620" y="163" font-size="11" fill="#3a3a3a" text-anchor="start">consume — they don&#x27;t build Kafka, a</text><text x="620" y="180" font-size="11" fill="#3a3a3a" text-anchor="start">registry, a catalog or observability</text><text x="620" y="197" font-size="11" fill="#3a3a3a" text-anchor="start">themselves.</text><text x="620" y="230" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">ON KUBERNETES / OPENSHIFT</text><text x="620" y="252" font-size="10.5" fill="#5a3a0a" text-anchor="start">• operators: Kafka, mesh, scaling, DB</text><text x="620" y="280" font-size="10.5" fill="#5a3a0a" text-anchor="start">• shared registry, catalog, telemetry</text><text x="620" y="308" font-size="10.5" fill="#5a3a0a" text-anchor="start">• platform addons + shared infra</text><rect x="888" y="86" width="270" height="360" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="906" y="118" font-size="13.5" fill="#2a5a1a" text-anchor="start" font-weight="700">4  Federated computational</text><text x="906" y="136" font-size="13.5" fill="#2a5a1a" text-anchor="start" font-weight="700">governance</text><text x="906" y="164" font-size="11" fill="#3a3a3a" text-anchor="start">Standards enforced computationally</text><text x="906" y="181" font-size="11" fill="#3a3a3a" text-anchor="start">by the platform — not by meetings or</text><text x="906" y="198" font-size="11" fill="#3a3a3a" text-anchor="start">policy documents.</text><text x="906" y="231" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">ON KUBERNETES / OPENSHIFT</text><text x="906" y="253" font-size="10.5" fill="#2a5a1a" text-anchor="start">• service-mesh mTLS between services</text><text x="906" y="281" font-size="10.5" fill="#2a5a1a" text-anchor="start">• registry rejects incompatible schemas</text><text x="906" y="309" font-size="10.5" fill="#2a5a1a" text-anchor="start">• admission control + CRD validation</text><text x="590" y="500" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">The tools are expressions of the pattern, not the pattern itself — a data mesh is an organizational and architectural shape.</text></svg>