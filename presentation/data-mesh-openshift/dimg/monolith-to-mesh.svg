<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 540" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="540" fill="#ffffff"/><defs><marker id="mk_1e1e1e_solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1e1e1e"/></marker><marker id="mk_5a8a3a_dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker><marker id="mk_c14a3a_solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker></defs><text x="590.0" y="30" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">From a monolithic data platform to a mesh</text><text x="590.0" y="49" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">decentralize ownership instead of centralizing the data</text><text x="295" y="80" font-size="14" fill="#7a2a1a" text-anchor="middle" font-weight="700">Before — centralized</text><rect x="120" y="100" width="350" height="360" fill="#fbf6f5" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="295.0" y="284.5" font-size="13" fill="#c14a3a" text-anchor="middle" font-weight="600"></text><rect x="150" y="130" width="290" height="60" fill="#fbe4e4" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="295.0" y="152.0" font-size="13" fill="#7a2a1a" text-anchor="middle" font-weight="600">Central data team</text><text x="295.0" y="167.0" font-size="10" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">owns lake + warehouse + pipelines</text><rect x="150" y="210" width="130" height="50" fill="#ffffff" stroke="#9a9a9a" stroke-width="1.5" rx="6"/><text x="215.0" y="238.5" font-size="11" fill="#3a3a3a" text-anchor="middle" font-weight="600">Data lake</text><rect x="310" y="210" width="130" height="50" fill="#ffffff" stroke="#9a9a9a" stroke-width="1.5" rx="6"/><text x="375.0" y="238.5" font-size="11" fill="#3a3a3a" text-anchor="middle" font-weight="600">Warehouse</text><rect x="150" y="290" width="130" height="40" fill="#efefef" stroke="#4a4a4a" stroke-width="1" rx="6"/><text x="215.0" y="313.0" font-size="10" fill="#2a2a2a" text-anchor="middle" font-weight="600">source A</text><polyline points="280,310 310,270" fill="none" stroke="#c14a3a" stroke-width="1.5" marker-end="url(#mk_c14a3a_solid)"/><rect x="150" y="342" width="130" height="40" fill="#efefef" stroke="#4a4a4a" stroke-width="1" rx="6"/><text x="215.0" y="365.0" font-size="10" fill="#2a2a2a" text-anchor="middle" font-weight="600">source B</text><polyline points="280,362 310,270" fill="none" stroke="#c14a3a" stroke-width="1.5" marker-end="url(#mk_c14a3a_solid)"/><rect x="150" y="394" width="130" height="40" fill="#efefef" stroke="#4a4a4a" stroke-width="1" rx="6"/><text x="215.0" y="417.0" font-size="10" fill="#2a2a2a" text-anchor="middle" font-weight="600">source C</text><polyline points="280,414 310,270" fill="none" stroke="#c14a3a" stroke-width="1.5" marker-end="url(#mk_c14a3a_solid)"/><rect x="310" y="290" width="130" height="40" fill="#efefef" stroke="#4a4a4a" stroke-width="1" rx="6"/><text x="375.0" y="313.0" font-size="10" fill="#2a2a2a" text-anchor="middle" font-weight="600">consumers</text><text x="295" y="444" font-size="11" fill="#7a2a1a" text-anchor="middle" font-style="italic">bottleneck as scale grows</text><polyline points="495,280 575,280" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#mk_1e1e1e_solid)"/><text x="535" y="268" font-size="11" fill="#1e1e1e" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">shift</text><text x="835" y="80" font-size="14" fill="#2a5a1a" text-anchor="middle" font-weight="700">After — a mesh of data products</text><rect x="600" y="100" width="470" height="360" fill="#f7faf4" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="835.0" y="284.5" font-size="13" fill="#5a8a3a" text-anchor="middle" font-weight="600"></text><rect x="620" y="122" width="430" height="34" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="835.0" y="143.0" font-size="12" fill="#2a5a1a" text-anchor="middle" font-weight="600">Federated computational governance</text><rect x="620" y="178" width="150" height="110" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="695.0" y="213.75" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="600">Domain A</text><text x="695.0" y="227.75" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">data product</text><text x="695.0" y="239.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">owns + serves</text><text x="695.0" y="250.75" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">its own data</text><rect x="790" y="178" width="150" height="110" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="865.0" y="213.75" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="600">Domain B</text><text x="865.0" y="227.75" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">data product</text><text x="865.0" y="239.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">owns + serves</text><text x="865.0" y="250.75" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">its own data</text><rect x="960" y="178" width="150" height="110" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="1035.0" y="213.75" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="600">Domain C</text><text x="1035.0" y="227.75" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">data product</text><text x="1035.0" y="239.25" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">owns + serves</text><text x="1035.0" y="250.75" font-size="9.5" fill="#7a5a2a" text-anchor="middle" font-family="'SF Mono', Menlo, monospace">its own data</text><polyline points="770,233 790,233" fill="none" stroke="#5a8a3a" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#mk_5a8a3a_dashed)"/><polyline points="940,233 960,233" fill="none" stroke="#5a8a3a" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#mk_5a8a3a_dashed)"/><rect x="620" y="308" width="430" height="34" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="835.0" y="329.0" font-size="12" fill="#5a3a0a" text-anchor="middle" font-weight="600">Self-serve data platform</text><text x="835" y="444" font-size="11" fill="#2a5a1a" text-anchor="middle" font-style="italic">ownership decentralized to domains; platform + standards keep it coherent</text></svg>