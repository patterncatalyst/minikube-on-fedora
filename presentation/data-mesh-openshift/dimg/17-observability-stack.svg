<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 540" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="540" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Observability — the mesh emits, the platform collects</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Metrics, traces, and the live topology, mostly without touching application code</text><rect x="120" y="90" width="170" height="70" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="205" y="122" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">order-svc</text><text x="205" y="142" font-size="9.5" fill="#666666" text-anchor="middle">+ sidecar</text><line x1="205" y1="160" x2="205" y2="215" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><rect x="320" y="90" width="170" height="70" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="405" y="122" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">inventory-svc</text><text x="405" y="142" font-size="9.5" fill="#666666" text-anchor="middle">+ sidecar</text><line x1="405" y1="160" x2="405" y2="215" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><rect x="520" y="90" width="170" height="70" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="605" y="122" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">gateway-svc</text><text x="605" y="142" font-size="9.5" fill="#666666" text-anchor="middle">+ sidecar</text><line x1="605" y1="160" x2="605" y2="215" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><text x="420" y="195" font-size="10.5" fill="#666666" text-anchor="middle" font-style="italic">metrics + traces (OTLP)</text><rect x="120" y="220" width="570" height="56" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="405" y="254" font-size="12" fill="#5a3a0a" text-anchor="middle" font-weight="700">OTEL Collector — receives OTLP, fans out</text><line x1="260" y1="276" x2="245" y2="320" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><line x1="405" y1="276" x2="530" y2="320" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><line x1="560" y1="276" x2="815" y2="320" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><rect x="120" y="320" width="250" height="90" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="245" y="348" font-size="12.5" fill="#3a3a3a" text-anchor="middle" font-weight="700">Prometheus</text><text x="245" y="370" font-size="10.5" fill="#3a3a3a" text-anchor="middle">scrapes mesh metrics:</text><text x="245" y="385" font-size="10.5" fill="#3a3a3a" text-anchor="middle">rates, errors, latency, lag</text><rect x="405" y="320" width="250" height="90" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="530" y="348" font-size="12.5" fill="#3a3a3a" text-anchor="middle" font-weight="700">Tempo</text><text x="530" y="370" font-size="10.5" fill="#3a3a3a" text-anchor="middle">stores distributed traces:</text><text x="530" y="385" font-size="10.5" fill="#3a3a3a" text-anchor="middle">spans across products</text><rect x="815" y="320" width="250" height="90" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="940" y="348" font-size="12.5" fill="#3a3a3a" text-anchor="middle" font-weight="700">Kiali</text><text x="940" y="370" font-size="10.5" fill="#3a3a3a" text-anchor="middle">live mesh topology:</text><text x="940" y="385" font-size="10.5" fill="#3a3a3a" text-anchor="middle">who calls whom, canary split</text><rect x="120" y="440" width="690" height="60" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="465" y="476" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">Grafana — one pane: dashboards over metrics + traces, correlated</text><line x1="245" y1="410" x2="360" y2="440" stroke="#5a5a5a" stroke-width="1.3" marker-end="url(#arr)"/><line x1="530" y1="410" x2="500" y2="440" stroke="#5a5a5a" stroke-width="1.3" marker-end="url(#arr)"/><rect x="880" y="440" width="180" height="60" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="970" y="466" font-size="11" fill="#a8331f" text-anchor="middle" font-weight="700">live view</text><text x="970" y="484" font-size="10" fill="#3a3a3a" text-anchor="middle">during demos</text><text x="590" y="524" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">The sidecars already measure the traffic they carry — most of this is observability you get from the platform, not code you write.</text></svg>