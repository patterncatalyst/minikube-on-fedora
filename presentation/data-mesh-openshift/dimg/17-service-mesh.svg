<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="560" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">The service mesh — sidecars, mTLS, and traffic shifting</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Istio / OpenShift Service Mesh: the data plane is a sidecar beside every product</text><rect x="120" y="120" width="250" height="150" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="245" y="145" font-size="13" fill="#1a3a6a" text-anchor="middle" font-weight="700">order-service</text><rect x="140" y="160" width="100" height="90" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="190" y="185" font-size="10.5" fill="#2a5a1a" text-anchor="middle">app</text><text x="190" y="200" font-size="10.5" fill="#2a5a1a" text-anchor="middle">container</text><rect x="250" y="160" width="100" height="90" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="300" y="185" font-size="10" fill="#a8331f" text-anchor="middle">istio-proxy</text><text x="300" y="199" font-size="10" fill="#a8331f" text-anchor="middle">(Envoy)</text><text x="300" y="213" font-size="10" fill="#a8331f" text-anchor="middle">sidecar</text><rect x="640" y="120" width="250" height="150" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="765" y="145" font-size="13" fill="#1a3a6a" text-anchor="middle" font-weight="700">inventory-service</text><rect x="660" y="160" width="100" height="90" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="710" y="185" font-size="10.5" fill="#2a5a1a" text-anchor="middle">app</text><text x="710" y="200" font-size="10.5" fill="#2a5a1a" text-anchor="middle">container</text><rect x="770" y="160" width="100" height="90" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="820" y="185" font-size="10" fill="#a8331f" text-anchor="middle">istio-proxy</text><text x="820" y="199" font-size="10" fill="#a8331f" text-anchor="middle">(Envoy)</text><text x="820" y="213" font-size="10" fill="#a8331f" text-anchor="middle">sidecar</text><line x1="420" y1="205" x2="770" y2="205" stroke="#c14a3a" stroke-width="2" marker-end="url(#arrR)"/><text x="595" y="195" font-size="11" fill="#a8331f" text-anchor="middle" font-weight="700">mutual TLS</text><text x="595" y="300" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">encrypted + authenticated, no app code</text><rect x="360" y="330" width="460" height="80" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="590" y="358" font-size="12.5" fill="#5a3a0a" text-anchor="middle" font-weight="700">istiod — the control plane</text><text x="590" y="380" font-size="10.5" fill="#3a3a3a" text-anchor="middle">issues identities/certs · pushes routing + policy to every sidecar</text><line x1="450" y1="330" x2="300" y2="272" stroke="#c19a6b" stroke-width="1.4" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="730" y1="330" x2="860" y2="272" stroke="#c19a6b" stroke-width="1.4" marker-end="url(#arr)" stroke-dasharray="4 3"/><rect x="120" y="450" width="940" height="70" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="140" y="478" font-size="12" fill="#2a5a1a" text-anchor="start" font-weight="700">Traffic shifting (canary):</text><rect x="370" y="462" width="150" height="26" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="445" y="479" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">v1 — 90%</text><rect x="540" y="462" width="150" height="26" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="615" y="479" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">v2 — 10%</text><text x="820" y="478" font-size="11" fill="#3a3a3a" text-anchor="start">weights move 90/10 → 50/50 → 0/100</text><text x="820" y="498" font-size="10" fill="#666666" text-anchor="start" font-style="italic">the mesh splits live traffic; no client change</text><text x="590" y="544" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">The mesh sits between products: it secures their traffic and routes it — both as platform properties, not application code.</text></svg>