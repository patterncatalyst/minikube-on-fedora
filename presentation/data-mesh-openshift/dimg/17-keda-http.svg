<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 500" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="500" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">KEDA HTTP add-on — scaling the read gateway on request volume</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">A synchronous read product's demand is incoming queries, including down to zero</text><rect x="90" y="110" width="230" height="110" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="205" y="138" font-size="12.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">incoming queries</text><text x="205" y="165" font-size="10.5" fill="#3a3a3a" text-anchor="middle">HTTP request volume</text><rect x="120" y="182" width="170" height="26" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="205" y="199" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">0 → bursts → 0</text><rect x="420" y="110" width="270" height="110" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="555" y="136" font-size="12.5" fill="#2a5a1a" text-anchor="middle" font-weight="700">KEDA HTTP add-on</text><text x="555" y="160" font-size="10" fill="#3a3a3a" text-anchor="middle">interceptor counts requests,</text><text x="555" y="175" font-size="10" fill="#3a3a3a" text-anchor="middle">holds them while scaling up</text><line x1="320" y1="165" x2="420" y2="165" stroke="#5a5a5a" stroke-width="1.8" marker-end="url(#arr)"/><rect x="800" y="110" width="290" height="110" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="945" y="138" font-size="12.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">graphql-gateway</text><text x="945" y="162" font-size="10.5" fill="#3a3a3a" text-anchor="middle">scales with request rate</text><rect x="835" y="182" width="220" height="26" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="945" y="199" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">0 → N replicas</text><line x1="690" y1="165" x2="800" y2="165" stroke="#5a8a3a" stroke-width="1.8" marker-end="url(#arrG)"/><rect x="90" y="280" width="1000" height="95" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="110" y="308" font-size="10" fill="#8a7a5a" text-anchor="start" font-weight="600">A DELIBERATE PLACEMENT DECISION</text><text x="110" y="332" font-size="11.5" fill="#3a3a3a" text-anchor="start">HTTP scaling goes on the gateway — NOT on order-service.</text><text x="110" y="352" font-size="11.5" fill="#3a3a3a" text-anchor="start">order-service carries the canary; HTTP-scaling a service whose traffic is split by weight would have the two mechanisms fight over the same pods.</text><rect x="90" y="400" width="1000" height="56" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="110" y="432" font-size="11" fill="#666666" text-anchor="start" font-style="italic">At rest (scaled to zero) the HTTP scaler reports "unknown" until the first request arrives — expected, not a fault.</text><text x="590" y="484" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Match the scaler to the workload: lag for the consumer, requests for the gateway, and neither on the canaried service.</text></svg>