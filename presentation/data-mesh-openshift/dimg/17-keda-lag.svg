<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 500" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="500" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">KEDA scaling on Kafka lag — scale to demand, and to zero</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">An event consumer's real demand is the backlog waiting for it</text><rect x="90" y="110" width="250" height="110" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="215" y="138" font-size="12.5" fill="#a8331f" text-anchor="middle" font-weight="700">order.placed topic</text><text x="215" y="165" font-size="10.5" fill="#3a3a3a" text-anchor="middle">consumer-group lag</text><rect x="140" y="182" width="150" height="26" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="13"/><text x="215" y="199" font-size="11" fill="#a8331f" text-anchor="middle" font-weight="700">lag = 0 → 230 msgs</text><rect x="450" y="110" width="250" height="110" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="575" y="138" font-size="14" fill="#2a5a1a" text-anchor="middle" font-weight="700">KEDA</text><text x="575" y="162" font-size="10.5" fill="#3a3a3a" text-anchor="middle">watches lag via the</text><text x="575" y="177" font-size="10.5" fill="#3a3a3a" text-anchor="middle">Kafka scaler trigger</text><line x1="340" y1="165" x2="450" y2="165" stroke="#c14a3a" stroke-width="1.8" marker-end="url(#arrR)"/><text x="395" y="152" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">reads</text><rect x="810" y="110" width="280" height="110" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="950" y="138" font-size="12.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">notification-service</text><text x="950" y="162" font-size="10.5" fill="#3a3a3a" text-anchor="middle">replicas scale with lag</text><rect x="835" y="182" width="230" height="26" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="950" y="199" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">0 → 1 → … → up to 10</text><line x1="700" y1="165" x2="810" y2="165" stroke="#5a8a3a" stroke-width="1.8" marker-end="url(#arrG)"/><text x="755" y="152" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">scales</text><rect x="90" y="280" width="1000" height="80" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="110" y="308" font-size="10" fill="#8a7a5a" text-anchor="start" font-weight="600">SCALE TO ZERO</text><text x="110" y="334" font-size="12" fill="#3a3a3a" text-anchor="start">Idle backlog → zero replicas: the product costs nothing while no events flow, then materializes when lag rises.</text><rect x="90" y="385" width="1000" height="70" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="110" y="412" font-size="12" fill="#5a3a0a" text-anchor="start" font-weight="700">Why not CPU?  </text><text x="245" y="412" font-size="11" fill="#3a3a3a" text-anchor="start">A consumer pegged at 0% CPU with a 10k-message backlog should scale up — CPU can't see that. Lag can.</text><text x="110" y="438" font-size="11" fill="#666666" text-anchor="start" font-style="italic">The signal is the work waiting, not the work being done.</text><text x="590" y="484" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Elastic data products: scale on the real demand signal — the queue — including all the way down to nothing.</text></svg>