</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">The four principles, realized on OpenShift</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">One picture: each principle and the platform pieces that deliver it</text><rect x="90" y="80" width="250" height="400" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="215" y="110" font-size="13.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">01  Domain ownership</text><rect x="108" y="140" width="214" height="50" fill="#ffffff" stroke="#2c5aa0" stroke-width="1.5" rx="8"/><text x="215" y="170" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">Projects</text><rect x="108" y="204" width="214" height="50" fill="#ffffff" stroke="#2c5aa0" stroke-width="1.5" rx="8"/><text x="215" y="234" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">project RBAC</text><rect x="108" y="268" width="214" height="50" fill="#ffffff" stroke="#2c5aa0" stroke-width="1.5" rx="8"/><text x="215" y="298" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">SCCs</text><rect x="108" y="332" width="214" height="50" fill="#ffffff" stroke="#2c5aa0" stroke-width="1.5" rx="8"/><text x="215" y="362" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">ResourceQuota</text><rect x="108" y="396" width="214" height="50" fill="#ffffff" stroke="#2c5aa0" stroke-width="1.5" rx="8"/><text x="215" y="426" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">a DB per domain</text><rect x="360" y="80" width="250" height="400" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="485" y="110" font-size="13.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">02  Data as a product</text><rect x="378" y="140" width="214" height="50" fill="#ffffff" stroke="#c97a3a" stroke-width="1.5" rx="8"/><text x="485" y="170" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">Deployments + Services</text><rect x="378" y="204" width="214" height="50" fill="#ffffff" stroke="#c97a3a" stroke-width="1.5" rx="8"/><text x="485" y="234" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">Routes</text><rect x="378" y="268" width="214" height="50" fill="#ffffff" stroke="#c97a3a" stroke-width="1.5" rx="8"/><text x="485" y="298" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">schema registry</text><rect x="378" y="332" width="214" height="50" fill="#ffffff" stroke="#c97a3a" stroke-width="1.5" rx="8"/><text x="485" y="362" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">OpenMetadata catalog</text><rect x="378" y="396" width="214" height="50" fill="#ffffff" stroke="#c97a3a" stroke-width="1.5" rx="8"/><text x="485" y="426" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">lineage</text><rect x="630" y="80" width="250" height="400" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="755" y="110" font-size="13.5" fill="#2a5a1a" text-anchor="middle" font-weight="700">03  Self-serve platform</text><rect x="648" y="140" width="214" height="50" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="8"/><text x="755" y="170" font-size="11.5" fill="#2a5a1a" text-anchor="middle" font-weight="700">OperatorHub / OLM</text><rect x="648" y="204" width="214" height="50" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="8"/><text x="755" y="234" font-size="11.5" fill="#2a5a1a" text-anchor="middle" font-weight="700">GitOps</text><rect x="648" y="268" width="214" height="50" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="8"/><text x="755" y="298" font-size="11.5" fill="#2a5a1a" text-anchor="middle" font-weight="700">AMQ Streams</text><rect x="648" y="332" width="214" height="50" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="8"/><text x="755" y="362" font-size="11.5" fill="#2a5a1a" text-anchor="middle" font-weight="700">CloudNativePG</text><rect x="648" y="396" width="214" height="50" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="8"/><text x="755" y="426" font-size="11.5" fill="#2a5a1a" text-anchor="middle" font-weight="700">KEDA</text><rect x="900" y="80" width="250" height="400" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="1025" y="110" font-size="13.5" fill="#a8331f" text-anchor="middle" font-weight="700">04  Federated governance</text><rect x="918" y="140" width="214" height="50" fill="#ffffff" stroke="#c14a3a" stroke-width="1.5" rx="8"/><text x="1025" y="170" font-size="11.5" fill="#a8331f" text-anchor="middle" font-weight="700">Service Mesh mTLS</text><rect x="918" y="204" width="214" height="50" fill="#ffffff" stroke="#c14a3a" stroke-width="1.5" rx="8"/><text x="1025" y="234" font-size="11.5" fill="#a8331f" text-anchor="middle" font-weight="700">canary delivery</text><rect x="918" y="268" width="214" height="50" fill="#ffffff" stroke="#c14a3a" stroke-width="1.5" rx="8"/><text x="1025" y="298" font-size="11.5" fill="#a8331f" text-anchor="middle" font-weight="700">admission policy</text><rect x="918" y="332" width="214" height="50" fill="#ffffff" stroke="#c14a3a" stroke-width="1.5" rx="8"/><text x="1025" y="362" font-size="11.5" fill="#a8331f" text-anchor="middle" font-weight="700">Prometheus / Tempo</text><rect x="918" y="396" width="214" height="50" fill="#ffffff" stroke="#c14a3a" stroke-width="1.5" rx="8"/><text x="1025" y="426" font-size="11.5" fill="#a8331f" text-anchor="middle" font-weight="700">Kiali</text><rect x="90" y="500" width="1000" height="56" fill="#151515" stroke="#151515" stroke-width="1.5" rx="8"/><text x="590" y="534" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">OpenShift — the substrate where all four principles find a home</text><text x="590" y="604" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">The mesh is the network of products — plus the platform and standards that let them interoperate.</text></svg>