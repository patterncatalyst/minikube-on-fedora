<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1120" height="520" fill="#ffffff"/><defs></defs><text x="560.0" y="30" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">We decentralized everything — except data</text><text x="560.0" y="49" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">the same shift that scaled software delivery, applied to analytical data</text><rect x="70" y="95" width="44" height="44" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="92.0" y="125.0" font-size="20" fill="#2a5a1a" text-anchor="middle" font-weight="600">✓</text><text x="130" y="115" font-size="13.5" fill="#1e1e1e" text-anchor="start" font-weight="600">Decentralize the business into domains</text><text x="130" y="133" font-size="11" fill="#666666" text-anchor="start" font-style="italic">domain-driven design</text><rect x="70" y="161" width="44" height="44" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="92.0" y="191.0" font-size="20" fill="#2a5a1a" text-anchor="middle" font-weight="600">✓</text><text x="130" y="181" font-size="13.5" fill="#1e1e1e" text-anchor="start" font-weight="600">Decentralize engineering into autonomous teams</text><text x="130" y="199" font-size="11" fill="#666666" text-anchor="start" font-style="italic">you build it, you run it</text><rect x="70" y="227" width="44" height="44" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="92.0" y="257.0" font-size="20" fill="#2a5a1a" text-anchor="middle" font-weight="600">✓</text><text x="130" y="247" font-size="13.5" fill="#1e1e1e" text-anchor="start" font-weight="600">Decentralize the monolith into microservices</text><text x="130" y="265" font-size="11" fill="#666666" text-anchor="start" font-style="italic">bounded contexts</text><rect x="70" y="293" width="44" height="44" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="92.0" y="323.0" font-size="20" fill="#2a5a1a" text-anchor="middle" font-weight="600">✓</text><text x="130" y="313" font-size="13.5" fill="#1e1e1e" text-anchor="start" font-weight="600">Decentralize operations into DevOps teams</text><text x="130" y="331" font-size="11" fill="#666666" text-anchor="start" font-style="italic">platform + self-service</text><text x="840" y="209" font-size="13" fill="#2a5a1a" text-anchor="middle" font-weight="700">→  scaled up</text><text x="840" y="231" font-size="13" fill="#2a5a1a" text-anchor="middle" font-weight="700">software delivery</text><rect x="70" y="377" width="44" height="44" fill="#ffffff" stroke="#c14a3a" stroke-width="2" rx="6"/><text x="92.0" y="407.0" font-size="20" fill="#7a2a1a" text-anchor="middle" font-weight="600"></text><text x="130" y="397" font-size="13.5" fill="#7a2a1a" text-anchor="start" font-weight="700">Decentralize the data lake into a data mesh</text><text x="130" y="415" font-size="11" fill="#7a2a1a" text-anchor="start" font-style="italic">the missing step — scale up data &amp; analytics</text><text x="840" y="403" font-size="13" fill="#7a2a1a" text-anchor="middle" font-weight="700">→  the opportunity</text></svg>