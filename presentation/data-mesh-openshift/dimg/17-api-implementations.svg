<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="560" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Four protocols, four contracts — each by fitness</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">A data product exposes the protocols that fit its role, not a uniform surface</text><rect x="90" y="90" width="250" height="175" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="106" y="118" font-size="14" fill="#1a3a6a" text-anchor="start" font-weight="700">REST</text><text x="106" y="142" font-size="10.5" fill="#666666" text-anchor="start" font-style="italic">request/response, cacheable</text><text x="106" y="172" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">WHERE IT FITS</text><text x="106" y="190" font-size="10.5" fill="#3a3a3a" text-anchor="start">external clients cross</text><text x="106" y="205" font-size="10.5" fill="#3a3a3a" text-anchor="start">the trust boundary here</text><text x="106" y="238" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">CONTRACT</text><text x="106" y="256" font-size="11" fill="#1a3a6a" text-anchor="start" font-weight="700">OpenAPI</text><rect x="370" y="90" width="250" height="175" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="386" y="118" font-size="14" fill="#2a5a1a" text-anchor="start" font-weight="700">gRPC</text><text x="386" y="142" font-size="10.5" fill="#666666" text-anchor="start" font-style="italic">fast, strongly-typed RPC</text><text x="386" y="172" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">WHERE IT FITS</text><text x="386" y="190" font-size="10.5" fill="#3a3a3a" text-anchor="start">synchronous service-to-</text><text x="386" y="205" font-size="10.5" fill="#3a3a3a" text-anchor="start">service calls in the mesh</text><text x="386" y="238" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">CONTRACT</text><text x="386" y="256" font-size="11" fill="#2a5a1a" text-anchor="start" font-weight="700">Protobuf (.proto)</text><rect x="650" y="90" width="250" height="175" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="666" y="118" font-size="14" fill="#7a3a0a" text-anchor="start" font-weight="700">GraphQL</text><text x="666" y="142" font-size="10.5" fill="#666666" text-anchor="start" font-style="italic">client-shaped composition</text><text x="666" y="172" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">WHERE IT FITS</text><text x="666" y="190" font-size="10.5" fill="#3a3a3a" text-anchor="start">one query composes reads</text><text x="666" y="205" font-size="10.5" fill="#3a3a3a" text-anchor="start">across several products</text><text x="666" y="238" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">CONTRACT</text><text x="666" y="256" font-size="11" fill="#7a3a0a" text-anchor="start" font-weight="700">GraphQL SDL</text><rect x="930" y="90" width="250" height="175" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="946" y="118" font-size="14" fill="#a8331f" text-anchor="start" font-weight="700">Events</text><text x="946" y="142" font-size="10.5" fill="#666666" text-anchor="start" font-style="italic">asynchronous, decoupled</text><text x="946" y="172" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">WHERE IT FITS</text><text x="946" y="190" font-size="10.5" fill="#3a3a3a" text-anchor="start">something happened;</text><text x="946" y="205" font-size="10.5" fill="#3a3a3a" text-anchor="start">downstreams react</text><text x="946" y="238" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">CONTRACT</text><text x="946" y="256" font-size="11" fill="#a8331f" text-anchor="start" font-weight="700">Avro schema</text><rect x="90" y="300" width="1000" height="90" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="110" y="326" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">IMPLEMENTED IN PYTHON</text><text x="110" y="348" font-size="11" fill="#3a3a3a" text-anchor="start">FastAPI  →  REST surface + OpenAPI emitted automatically        grpcio  →  gRPC servers from the .proto</text><text x="110" y="370" font-size="11" fill="#3a3a3a" text-anchor="start">Strawberry  →  GraphQL gateway resolvers (call REST + gRPC)      aiokafka  →  async event producer/consumer</text><rect x="90" y="415" width="1000" height="95" fill="#ffffff" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="110" y="441" font-size="10.5" fill="#5a3a0a" text-anchor="start" font-weight="700">THE GATEWAY COMPOSES — one query, multiple backends</text><rect x="110" y="458" width="130" height="26" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="175" y="475" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">GraphQL in</text><line x1="245" y1="471" x2="300" y2="471" stroke="#5a5a5a" stroke-width="1.6" marker-end="url(#arr)"/><rect x="310" y="458" width="180" height="26" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="400" y="475" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">REST → order-svc</text><rect x="500" y="458" width="200" height="26" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="13"/><text x="600" y="475" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">gRPC → inventory-svc</text><line x1="710" y1="471" x2="765" y2="471" stroke="#5a5a5a" stroke-width="1.6" marker-end="url(#arr)"/><rect x="775" y="458" width="200" height="26" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="875" y="475" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">shaped response out</text><text x="590" y="544" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">REST at the edge, gRPC between services, GraphQL to compose, events to decouple — each protocol earning its place by fitness.</text></svg>