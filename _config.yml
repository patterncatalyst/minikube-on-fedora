# ────────────────────────────────────────────────────────────────────────────
# Project: minikube-on-fedora
# Site identity, GitHub link target, and baseurl. Build configuration below
# generally doesn't need changes.
# ────────────────────────────────────────────────────────────────────────────

# Site identity
title: "Minikube Tutorial on Fedora"
description: "Install and use minikube on Fedora 44 with kubectl and helm."
brand_emoji: "☸️"   # Single emoji that appears next to the title in the header

# GitHub identity for header link and example sourcing
github_username: "patterncatalyst"
github_repo: "minikube-on-fedora"

# baseurl
# - On user/org Pages site (USERNAME.github.io): set to ""
# - On project Pages site (USERNAME.github.io/PROJECT): set to "/PROJECT"
# - For local dev override at runtime: bundle exec jekyll serve --baseurl ""
baseurl: "/minikube-on-fedora"

# url is set at deploy time; leave blank for GitHub Pages auto-detection
url: ""

# ────────────────────────────────────────────────────────────────────────────
# Build configuration — generally don't change these.
# ────────────────────────────────────────────────────────────────────────────

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

# Collections — _docs and _plans are not Jekyll defaults; this enables them.
collections:
  docs:
    output: true
    permalink: /docs/:name/
  plans:
    output: true
    permalink: /plans/:name/
  example_pages:
    output: true
    permalink: /examples/:name/

# Default front-matter — saves typing `layout: tutorial` on every doc.
defaults:
  - scope:
      path: ""
      type: docs
    values:
      layout: tutorial
  - scope:
      path: ""
      type: plans
    values:
      layout: plan

# Files that Jekyll should not process or include in the built site.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - examples/   # ← important: trailing slash; runnable code lives here, not site content
  - scripts/
  - README.md
  - LICENSE
  - PRD.md
  - LESSONS-LEARNED.md
  - GETTING-STARTED.md
  - STARTING-WITH-CLAUDE.md
  - r18-INSTRUCTIONS.md
